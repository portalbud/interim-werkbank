<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interim Werkbank</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap');
:root{
 --ink:#16201c;--ink-soft:#3c4a43;--paper:#f3efe6;--paper-2:#eae4d6;
 --line:#cfc7b4;--moss:#4a6b4d;--moss-deep:#2f4733;--rust:#b5562f;
 --gold:#c79a3a;--slate:#5d6b78;--white:#fffdf8;
 --shadow:0 1px 0 rgba(22,32,28,.06),0 8px 30px -18px rgba(22,32,28,.45);
 --mono:'IBM Plex Mono',ui-monospace,monospace;
 --sans:'Inter',-apple-system,sans-serif;
}
*{box-sizing:border-box}html,body{margin:0;height:100%}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.app{display:grid;grid-template-columns:252px 1fr;height:100vh}
aside{background:var(--moss-deep);color:#e8eee6;padding:22px 18px;display:flex;flex-direction:column;gap:22px;border-right:1px solid rgba(0,0,0,.15);overflow-y:auto}
.brand .mark{font-family:'Fraunces',serif;font-weight:600;font-size:20px;color:var(--white)}
.brand .sub{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#9fb5a3}
nav{display:flex;flex-direction:column;gap:2px}
nav button{all:unset;cursor:pointer;display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:7px;color:#c7d3c8;font-weight:500;font-size:13px}
nav button .dot{width:7px;height:7px;border-radius:50%;background:#6f8a72;flex-shrink:0}
nav button:hover{background:rgba(255,255,255,.06);color:#fff}
nav button.active{background:var(--moss);color:#fff}
nav button.active .dot{background:var(--gold)}
nav .badge{margin-left:auto;font-family:var(--mono);font-size:11px;background:rgba(255,255,255,.12);padding:1px 7px;border-radius:20px}
.sidebar-section{border-top:1px solid rgba(255,255,255,.08);padding-top:16px}
.sidebar-section label{display:block;color:#9fb5a3;font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em;font-size:9.5px;margin-bottom:6px}
.sidebar-section input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:#fff;border-radius:6px;padding:7px 8px;font-family:var(--mono);font-size:11px}
.sidebar-section .hint{color:#8aa08e;margin-top:5px;font-size:11px;line-height:1.4}
.conn-dot{width:8px;height:8px;border-radius:50%;background:#6f8a72;display:inline-block;margin-right:5px}
.conn-dot.ok{background:#5cb87a}.conn-dot.err{background:var(--rust)}.conn-dot.loading{background:var(--gold)}
main{overflow-y:auto;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:10;background:rgba(243,239,230,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:16px 28px;display:flex;align-items:center;gap:12px}
.topbar h1{font-family:'Fraunces',serif;font-weight:600;font-size:22px;margin:0;letter-spacing:-.3px}
.topbar .sub{color:var(--ink-soft);font-size:12px;margin-left:2px}
.topbar .spacer{flex:1}
.view{padding:24px 28px 80px;flex:1}
/* buttons */
.btn{all:unset;cursor:pointer;font-weight:600;font-size:12.5px;padding:9px 16px;border-radius:8px;background:var(--moss);color:#fff;transition:.12s;white-space:nowrap}
.btn:hover{background:var(--moss-deep)}.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.ghost{background:transparent;color:var(--moss);border:1.5px solid var(--moss)}
.btn.ghost:hover{background:rgba(74,107,77,.08)}
.btn.sm{padding:6px 11px;font-size:11.5px}
.btn.danger{background:var(--rust)}.btn.danger:hover{background:#8f3f20}
.btn.gold{background:var(--gold);color:#3a2c08}
/* stats */
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.stat{background:var(--white);border:1px solid var(--line);border-radius:11px;padding:15px 16px;box-shadow:var(--shadow)}
.stat .n{font-family:'Fraunces',serif;font-size:28px;font-weight:600;line-height:1}
.stat .l{font-size:11.5px;color:var(--ink-soft);margin-top:4px}
.stat.alert .n{color:var(--rust)}.stat.gold .n{color:var(--gold)}
/* cards */
.card{background:var(--white);border:1px solid var(--line);border-radius:11px;box-shadow:var(--shadow);overflow:hidden}
.section-label{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.13em;color:var(--ink-soft);margin:22px 0 10px;display:flex;align-items:center;gap:10px}
.section-label::after{content:"";flex:1;height:1px;background:var(--line)}
.section-label:first-child{margin-top:0}
/* list rows */
.row{padding:14px 16px;display:flex;gap:12px;align-items:flex-start;cursor:pointer;transition:.1s;border-bottom:1px solid var(--paper-2)}
.row:last-child{border-bottom:none}
.row:hover{background:var(--paper-2)}
.row .title{font-weight:600;font-size:14px;margin-bottom:2px}
.row .meta{font-size:12px;color:var(--ink-soft);display:flex;gap:12px;flex-wrap:wrap}
.row .right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;white-space:nowrap;margin-left:auto}
/* tags/pills */
.role-tag{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.07em;padding:3px 8px;border-radius:5px;border:1px solid;flex-shrink:0}
.role-agile{color:#7a5a1e;border-color:#d9c08a;background:#f6efdc}
.role-projectmanagement{color:#2f4733;border-color:#a9c4ad;background:#e3eee4}
.role-process{color:#4a4a6b;border-color:#b3b3d1;background:#e8e8f2}
.role-business{color:#7a3520;border-color:#dba893;background:#f6e4dc}
.role-overig{color:#555;border-color:#ccc;background:#f0f0ec}
.pill{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.05em;padding:3px 9px;border-radius:20px;border:1px solid var(--line);white-space:nowrap}
.pill-nieuw{background:#fff;color:var(--slate)}
.pill-geanalyseerd{background:#eef4ee;color:var(--moss);border-color:#a9c4ad}
.pill-kandidaten_gevonden{background:#e3eee4;color:var(--moss-deep);border-color:#7fa183}
.pill-concept_klaar{background:#fbf3df;color:#8a6a18;border-color:#d9c08a}
.pill-verzonden{background:#e8e8f2;color:#4a4a6b;border-color:#b3b3d1}
.pill-afgewezen{background:#f0eeea;color:#999}
.pill-dup{color:var(--rust);border-color:var(--rust)}
.dl{font-family:var(--mono);font-size:11px}
.dl.soon{color:var(--rust);font-weight:600}
/* chips */
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.chip{font-size:11.5px;background:var(--paper-2);border:1px solid var(--line);padding:3px 9px;border-radius:20px}
.chip.req{background:#f6e4dc;border-color:#dba893;color:#7a3520}
/* panels (drawer) */
.panel{background:var(--white);border:1px solid var(--line);border-radius:10px;padding:15px 17px;margin-bottom:14px}
.panel h3{margin:0 0 11px;font-size:12px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em;color:var(--moss-deep)}
.kv{display:grid;grid-template-columns:145px 1fr;gap:5px 12px;font-size:13px}
.kv dt{color:var(--ink-soft);font-weight:500}.kv dd{margin:0;font-weight:500}
.raw-txt{font-family:var(--mono);font-size:11px;white-space:pre-wrap;background:var(--paper-2);border-radius:7px;padding:11px;color:var(--ink-soft);max-height:150px;overflow:auto}
/* match cards */
.match{border:1px solid var(--line);border-radius:10px;padding:13px 15px;margin-bottom:11px;background:var(--white)}
.match-top{display:flex;align-items:center;gap:11px;margin-bottom:9px}
.score-ring{--p:0;width:44px;height:44px;border-radius:50%;flex-shrink:0;background:conic-gradient(var(--moss) calc(var(--p)*1%),var(--paper-2) 0);display:grid;place-items:center}
.score-ring span{width:32px;height:32px;border-radius:50%;background:var(--white);display:grid;place-items:center;font-family:var(--mono);font-weight:600;font-size:12px}
.score-ring.low{background:conic-gradient(var(--rust) calc(var(--p)*1%),var(--paper-2) 0)}
.score-ring.mid{background:conic-gradient(var(--gold) calc(var(--p)*1%),var(--paper-2) 0)}
.reasoning{display:grid;grid-template-columns:1fr 1fr;gap:9px;font-size:11.5px}
.reasoning .col h4{margin:0 0 4px;font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.07em}
.reasoning ul{margin:0;padding-left:15px}.reasoning li{margin-bottom:2px}
.pro h4{color:var(--moss)}.risk h4{color:var(--rust)}.covered h4{color:var(--moss-deep)}.missing h4{color:var(--slate)}
.go-nogo{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;border-top:1px dashed var(--line);padding-top:11px}
.dec{all:unset;cursor:pointer;font-size:11.5px;font-weight:600;padding:7px 12px;border-radius:7px;border:1px solid var(--line);background:var(--white);color:var(--ink-soft)}
.dec:hover{border-color:var(--moss);color:var(--moss)}
.dec.yes{background:var(--moss);color:#fff;border-color:var(--moss)}
.dec.no{background:var(--rust);color:#fff;border-color:var(--rust)}
.dec.wait{background:var(--gold);color:#3a2c08;border-color:var(--gold)}
/* draft */
.draft-section{margin-top:12px;border-top:2px solid var(--moss);padding-top:13px}
.draft-section h4{margin:0 0 11px;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--moss-deep)}
.df{margin-bottom:10px}
.df label{display:block;font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);margin-bottom:4px}
.df input,.df textarea{width:100%;border:1px solid var(--line);border-radius:7px;padding:8px 10px;font-family:var(--sans);font-size:13px;background:var(--white)}
.df textarea{min-height:160px;resize:vertical;line-height:1.55}
/* forms */
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:600;margin-bottom:4px}
.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px 11px;font-family:var(--sans);font-size:13px;background:var(--white)}
.field textarea{resize:vertical;line-height:1.5}
.field .help{font-size:11px;color:var(--slate);margin-top:3px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* upload zones */
.upload-zone{border:2px dashed var(--line);border-radius:10px;padding:28px 20px;text-align:center;color:var(--ink-soft);font-size:13px;cursor:pointer;transition:.15s;background:var(--paper-2)}
.upload-zone:hover,.upload-zone.over{border-color:var(--moss);color:var(--moss);background:#e8f0e8}
.upload-zone .icon{font-size:28px;display:block;margin-bottom:8px}
.upload-zone strong{color:var(--ink)}
.filechip{display:flex;align-items:center;gap:8px;background:var(--white);border:1px solid var(--line);border-radius:7px;padding:7px 11px;font-size:12px;margin-top:7px}
.filechip .x{margin-left:auto;cursor:pointer;color:var(--rust);font-weight:700;font-size:14px}
/* mail batch */
.mail-item{padding:11px 14px;border-bottom:1px solid var(--paper-2);display:flex;gap:10px;align-items:flex-start}
.mail-item:last-child{border-bottom:none}
.mail-item .chk{margin-top:2px}
.mail-item .body{flex:1}
.mail-item .subj{font-weight:600;font-size:13px}
.mail-item .from{font-size:11.5px;color:var(--ink-soft)}
.mail-item .tag{font-family:var(--mono);font-size:9px;text-transform:uppercase;padding:2px 6px;border-radius:4px;border:1px solid}
/* attach */
.attach{display:inline-flex;align-items:center;gap:7px;background:var(--paper-2);border:1px solid var(--line);border-radius:7px;padding:6px 10px;font-size:12px;font-family:var(--mono);cursor:pointer}
.attach:hover{border-color:var(--moss)}
/* drawer */
.overlay{position:fixed;inset:0;background:rgba(22,32,28,.44);z-index:40;display:none}
.overlay.show{display:block}
.drawer{position:fixed;top:0;right:0;height:100vh;width:min(780px,95vw);background:var(--paper);z-index:41;box-shadow:-14px 0 40px -20px rgba(0,0,0,.5);transform:translateX(100%);transition:transform .24s ease;display:flex;flex-direction:column}
.drawer.show{transform:translateX(0)}
.drawer-head{padding:16px 22px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:10px;background:var(--white);flex-shrink:0}
.drawer-head h2{font-family:'Fraunces',serif;font-size:18px;margin:0 0 2px;letter-spacing:-.3px}
.drawer-head .dsub{font-size:12px;color:var(--ink-soft)}
.drawer-head .close{all:unset;cursor:pointer;font-size:22px;color:var(--ink-soft);padding:2px 6px;border-radius:5px;line-height:1}
.drawer-head .close:hover{background:var(--paper-2)}
.drawer-body{overflow-y:auto;padding:20px 22px 60px;flex:1}
/* banner */
.banner{border-radius:9px;padding:10px 13px;font-size:12.5px;margin-bottom:14px;display:flex;gap:8px;align-items:flex-start}
.banner.warn{background:#fbf3df;border:1px solid #d9c08a;color:#7a5a1e}
.banner.dup{background:#f6e4dc;border:1px solid #dba893;color:#7a3520}
.banner.info{background:#e3eee4;border:1px solid #a9c4ad;color:#2f4733}
/* cv preview */
.cv-preview iframe{width:100%;height:400px;border:0;border-radius:8px;border:1px solid var(--line)}
/* spinner */
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;vertical-align:-2px}
.spin.d{border-color:rgba(74,107,77,.2);border-top-color:var(--moss)}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px 20px;color:var(--ink-soft)}
.empty .big{font-family:'Fraunces',serif;font-size:18px;color:var(--ink);margin-bottom:6px}
.nocv{font-size:11.5px;color:var(--rust);margin-top:6px}
/* toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:9px;font-size:13px;z-index:99;opacity:0;transition:.22s;box-shadow:var(--shadow);max-width:85vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:700px){.app{grid-template-columns:1fr}aside{display:none}.two-col{grid-template-columns:1fr}}
  /* Kalender */
  .kal-wrap{overflow-x:auto;margin:0 -4px}
  .kal-table{border-collapse:collapse;min-width:900px;width:100%}
  .kal-table th{background:var(--moss-deep);color:#e8eee6;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;padding:10px 12px;white-space:nowrap;position:sticky;top:0;z-index:2}
  .kal-table th.maand-col{background:var(--moss);min-width:90px}
  .kal-table td{border:1px solid var(--line);padding:6px;vertical-align:top;min-width:160px;min-height:52px;background:var(--white)}
  .kal-table td.maand-cel{background:var(--paper-2);font-weight:600;font-size:12px;font-family:var(--mono);padding:10px 12px;white-space:nowrap;position:sticky;left:0;z-index:1}
  .kal-table tr.huidig-jaar td.maand-cel{color:var(--moss-deep)}
  .kal-table tr.volgend-jaar td.maand-cel{color:var(--slate)}
  .kal-cel{min-height:44px;border-radius:6px;padding:4px;display:flex;flex-direction:column;gap:3px}
  .kal-cel.over{background:rgba(74,107,77,.08);border:2px dashed var(--moss)}
  .kal-chip{display:flex;align-items:center;gap:5px;padding:5px 8px;border-radius:6px;font-size:12px;font-weight:600;cursor:grab;user-select:none;border:1px solid transparent}
  .kal-chip.beschikbaar{background:#e3eee4;color:var(--moss-deep);border-color:#a9c4ad}
  .kal-chip.geplaatst{background:#fbf3df;color:#8a6a18;border-color:#d9c08a}
  .kal-chip .rm{margin-left:auto;cursor:pointer;font-size:13px;opacity:.5;font-weight:700;line-height:1;padding:0 2px}
  .kal-chip .rm:hover{opacity:1;color:var(--rust)}
  .kal-add{font-size:11px;color:var(--line);cursor:pointer;padding:4px;border-radius:4px;text-align:center;border:1px dashed transparent}
  .kal-add:hover{border-color:var(--line);color:var(--ink-soft)}
  .kal-sidebar{width:200px;flex-shrink:0}
  .kal-cand-chip{padding:7px 10px;background:var(--white);border:1px solid var(--line);border-radius:7px;font-size:12.5px;font-weight:600;cursor:grab;margin-bottom:5px;display:flex;align-items:center;gap:7px}
  .kal-cand-chip:hover{border-color:var(--moss)}
  .status-toggle{font-size:10px;font-family:var(--mono);padding:2px 6px;border-radius:4px;cursor:pointer;border:1px solid;margin-left:auto}
</style>
</head>
<body>
<div class="app">
 <aside>
  <div class="brand"><div class="mark">Werkbank</div><div class="sub">Interim · v2</div></div>
  <nav id="nav">
   <button data-v="vandaag" class="active"><span class="dot"></span>Vandaag<span class="badge" id="b-vandaag">0</span></button>
   <button data-v="rollen"><span class="dot"></span>Rollen<span class="badge" id="b-rollen">0</span></button>
   <button data-v="team"><span class="dot"></span>Team &amp; CV</button>
  </nav>
  <div style="margin-top:auto;border-top:1px solid rgba(255,255,255,.08);padding-top:12px">
   <button data-v="instellingen" style="all:unset;cursor:pointer;display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:7px;color:#c7d3c8;font-weight:500;font-size:13px;width:100%"><span class="dot"></span>Instellingen</button>
  </div>
  <div class="sidebar-section">
   <label>Claude API-sleutel</label>
   <input id="claudeKey" type="password" placeholder="sk-ant-...">
   <div class="hint">Alleen lokaal opgeslagen in deze browser.</div>
  </div>
  <div class="sidebar-section" style="margin-top:auto">
   <div style="font-size:11px;color:#9fb5a3"><span class="conn-dot" id="dbDot"></span><span id="dbStatus">Verbinding controleren…</span></div>
  </div>
 </aside>
 <main>
  <div class="topbar">
   <div><h1 id="vTitle">Dashboard</h1></div>
   <div class="spacer"></div>
   <div id="topActions" style="display:flex;gap:8px"></div>
  </div>
  <div class="view" id="view"></div>
 </main>
</div>
<div class="overlay" id="overlay"></div>
<div class="drawer" id="drawer">
 <div class="drawer-head">
  <div style="flex:1"><h2 id="dTitle"></h2><div class="dsub" id="dSub"></div></div>
  <button class="close" id="dClose">×</button>
 </div>
 <div class="drawer-body" id="dBody"></div>
</div>
<div class="toast" id="toast"></div>

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<script>
'use strict';
/* ═══════════════════════════════════════════════
  CONFIG
═══════════════════════════════════════════════ */
const SB_URL='https://rpwmffdvbcfcbbkkfaem.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJwd21mZmR2YmNmY2Jia2tmYWVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMjM5MjMsImV4cCI6MjA5Njc5OTkyM30.6JtWoNCFkZV36xE8OgD3I7o8uo0bIeuicCEzqKsaU-U';
let sb;
try{
 sb=supabase.createClient(SB_URL,SB_KEY);
}catch(e){
 console.error('Supabase init fout:',e);
 document.getElementById('dbStatus').textContent='Library laad-fout: '+e.message;
}

const ROLE_LABELS={agile:'Agile',projectmanagement:'Projectmanagement',process:'Process management',business:'Business analyse',overig:'Overig'};

/* ═══════════════════════════════════════════════
  DB LAYER - alle Supabase calls hier
═══════════════════════════════════════════════ */
const DB={
 async checkConn(){const{error}=await sb.from('instellingen').select('id').limit(1);return!error;},

function claudeKey(){return document.getElementById('claudeKey').value.trim();}
async function claude(system,user,tokens=1600){
 const k=claudeKey(); if(!k)throw new Error('Geen Claude API-sleutel ingevuld.');
 const r=await fetch('https://api.anthropic.com/v1/messages',{
  method:'POST',
  headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
  body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:tokens,system,messages:[{role:'user',content:user}]})
 });
 if(!r.ok){const t=await r.text();throw new Error('Claude '+r.status+': '+t.slice(0,200));}
 const d=await r.json();
 return d.content.map(b=>b.type==='text'?b.text:'').join('\n').trim();
}

function genUUID(){
  // Werkt op http:// en https://, ook zonder crypto.randomUUID
  if(typeof crypto!=='undefined' && crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){
    const r=Math.random()*16|0, v=c==='x'?r:(r&0x3|0x8);
    return v.toString(16);
  });
}
function pj(txt){
  let t = txt.replace(/```json/gi,'').replace(/```/g,'').trim();
  // Haal het JSON-object eruit
  const s = t.indexOf('{'), e = t.lastIndexOf('}');
  if(s >= 0 && e >= 0) t = t.slice(s, e+1);

  // Probeer direct
  try{ return JSON.parse(t); }catch(e1){}

  // Repareer veelvoorkomende problemen:
  // 1. Verwijder control-characters (nullbytes, tabs in strings etc.)
  t = t.replace(/[\x00-\x08\x0b\x0c\x0e-\x1f]/g, ' ');
  // 2. Vervang enkele aanhalingstekens in waarden door escaped dubbele
  // 3. Verwijder trailing komma's voor ] en }
  t = t.replace(/,\s*([\]}])/g, '$1');
  try{ return JSON.parse(t); }catch(e2){}

  // Afgekapte JSON: probeer het object te reconstrueren door af te kappen op laatste valide punt
  // Zoek de laatste complete array-element of property afsluitend met " of }
  let repaired = t;
  // Sluit openstaande arrays en objecten
  const opens = [];
  let inStr = false, esc = false;
  for(let i = 0; i < repaired.length; i++){
    const c = repaired[i];
    if(esc){ esc = false; continue; }
    if(c === '\\' && inStr){ esc = true; continue; }
    if(c === '"' && !esc){ inStr = !inStr; continue; }
    if(!inStr){
      if(c === '{' || c === '[') opens.push(c);
      else if(c === '}') opens.pop();
      else if(c === ']') opens.pop();
    }
  }
  // Voeg sluitende tekens toe
  // Verwijder eerst eventuele losse komma aan het eind
  repaired = repaired.replace(/,\s*$/, '');
  for(let i = opens.length - 1; i >= 0; i--){
    repaired += opens[i] === '[' ? ']' : '}';
  }
  try{ return JSON.parse(repaired); }catch(e3){
    throw new Error('JSON parse mislukt: ' + e3.message + ' (eerste 200 tekens: ' + t.slice(0,200) + ')');
  }
}

/* ═══════════════════════════════════════════════
  MAIL PARSING (.eml / .msg tekst-extractie)
═══════════════════════════════════════════════ */
async function parseMail(file){
 const name=file.name.toLowerCase();
 let raw='', from='', subject='', body='', date='';
 if(name.endsWith('.eml')){
  raw=await file.text();
  from=(raw.match(/^From:\s*(.+)/mi)||[])[1]||file.name;
  subject=(raw.match(/^Subject:\s*(.+)/mi)||[])[1]||'(geen onderwerp)';
  date=(raw.match(/^Date:\s*(.+)/mi)||[])[1]||new Date().toISOString();
  // body: alles na dubbele newline, strip quoted-printable basics
  const bi=raw.indexOf('\r\n\r\n')>=0?raw.indexOf('\r\n\r\n')+4:raw.indexOf('\n\n')+2;
  body=raw.slice(bi).replace(/=\r?\n/g,'').replace(/=[0-9A-F]{2}/gi,m=>String.fromCharCode(parseInt(m.slice(1),16))).replace(/<[^>]+>/g,' ').replace(/\s{3,}/g,'\n').trim().slice(0,6000);
 } else if(name.endsWith('.msg')){
  // .msg is binair; we lezen het als tekst en extraheren leesbare delen
  const buf=await file.arrayBuffer();
  const dec=new TextDecoder('utf-8',{fatal:false});
  raw=dec.decode(buf).replace(/\x00/g,'');
  subject=file.name.replace('.msg','');
  from=file.name;
  body=raw.replace(/[^\x20-\x7E\n\r]/g,' ').replace(/\s{4,}/g,'\n').trim().slice(0,4000);
  date=new Date().toISOString();
 } else if(name.endsWith('.txt')){
  body=await file.text(); subject=file.name; from='upload'; date=new Date().toISOString();
 }
 return{id:'mail_'+Date.now()+'_'+Math.random().toString(36).slice(2),from:from.trim(),subject:decodeMailHeader(subject.trim()),body:body.trim(),received:new Date(date).toISOString()||new Date().toISOString(),filename:file.name};
}
function decodeMailHeader(h){
 // basis =?utf-8?q?...?= decode
 return h.replace(/=\?utf-8\?q\?([^?]+)\?=/gi,(_,enc)=>enc.replace(/_/g,' ').replace(/=[0-9A-F]{2}/gi,m=>String.fromCharCode(parseInt(m.slice(1),16)))).replace(/=\?utf-8\?b\?([^?]+)\?=/gi,(_,enc)=>atob(enc));
}

/* ZIP extractie */
async function extractZip(file){
 // Gebruik JSZip als die geladen is, anders toon foutmelding
 if(typeof JSZip==='undefined'){toast('JSZip niet geladen - sleep losse .eml bestanden.');return[];}
 const zip=await JSZip.loadAsync(file);
 const mails=[];
 for(const [name,entry] of Object.entries(zip.files)){
  if(entry.dir)continue;
  const ext=name.split('.').pop().toLowerCase();
  if(!['eml','msg','txt'].includes(ext))continue;
  const blob=await entry.async('blob');
  const f=new File([blob],name,{type:'text/plain'});
  mails.push(await parseMail(f));
 }
 return mails;
}

// Dedup
function detectDups(list){
 const rel=list.filter(r=>r.is_relevant&&!r.duplicate_of);
 for(let i=0;i<rel.length;i++)for(let j=i+1;j<rel.length;j++){
  const a=rel[i],b=rel[j];if(b.duplicate_of)continue;
  if(simScore(`${a.functietitel} ${a.locatie} ${a.opdrachtgever}`,`${b.functietitel} ${b.locatie} ${b.opdrachtgever}`)>0.45)b.duplicate_of=a.id;
 }
}
function simScore(a,b){
 const tok=s=>new Set(s.toLowerCase().replace(/[^a-z0-9 ]/g,' ').split(/\s+/).filter(w=>w.length>2));
 const A=tok(a),B=tok(b);if(!A.size||!B.size)return 0;
 let n=0;A.forEach(w=>{if(B.has(w))n++;});return n/Math.min(A.size,B.size);
}

/* ═══════════════════════════════════════════════
   DOCX HERSCHRIJF ENGINE
   Vervangt tekst in Word-XML zonder opmaak aan te raken.
   JSZip is al geladen.
═══════════════════════════════════════════════ */

// Haal de plain-text inhoud op uit Word-XML (para's samenvoegen)
function docxGetText(xmlStr) {
  const texts = [];
  const matches = xmlStr.matchAll(/<w:t[^>]*>([^<]*)<\/w:t>/g);
  for (const m of matches) texts.push(m[1]);
  return texts.join(' ');
}

// Vervang tekst in Word-XML op run-niveau
// Strategie: bouw een platte tekst van alle runs, zoek de oude tekst daarin,
// vervang hem, en schrijf de nieuwe tekst terug in de eerste run van de reeks
function xmlReplaceText(xmlStr, oudeTekst, nieuweTekst) {
  if (!oudeTekst || !nieuweTekst || oudeTekst === nieuweTekst) return xmlStr;
  // Normaliseer: verwijder extra witruimte
  const norm = s => s.replace(/\s+/g, ' ').trim();
  const zoek = norm(oudeTekst);
  if (!zoek) return xmlStr;

  // Methode 1: directe vervangng als tekst in één <w:t> zit
  const escaped = zoek.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const direct = new RegExp('(<w:t[^>]*>)' + escaped + '(<\\/w:t>)', 'g');
  if (direct.test(xmlStr)) {
    return xmlStr.replace(direct, '$1' + escXml(nieuweTekst) + '$2');
  }

  // Methode 2: tekst is verspreid over meerdere runs - zoek op paragraaf-niveau
  // Vervang binnen elke <w:p>...</w:p>
  return xmlStr.replace(/<w:p[ >][\s\S]*?<\/w:p>/g, para => {
    const flatText = norm(docxGetText(para));
    if (!flatText.includes(zoek)) return para;
    // Verzamel alle w:t inhouden
    const runs = [...para.matchAll(/<w:t([^>]*)>([^<]*)<\/w:t>/g)];
    if (!runs.length) return para;
    // Bouw gecombineerde string en zoek positie
    const combined = runs.map(r => r[2]).join('');
    const normCombined = norm(combined);
    if (!normCombined.includes(zoek)) return para;
    // Zet alle runs samen in de eerste run, wis de rest
    let result = para;
    // Zet nieuwe tekst in de eerste run
    result = result.replace(
      /<w:t([^>]*)>[^<]*<\/w:t>/,
      '<w:t$1>' + escXml(nieuweTekst) + '</w:t>'
    );
    // Wis tekst uit overige runs (laat de runs intact voor opmaak)
    let first = true;
    result = result.replace(/<w:t([^>]*)>[^<]*<\/w:t>/g, m => {
      if (first) { first = false; return m; }
      return m.replace(/<w:t([^>]*)>[^<]*<\/w:t>/, '<w:t$1></w:t>');
    });
    return result;
  });
}

function escXml(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&apos;');
}

// Hoofd-functie: pas een .docx blob aan op basis van cvData
async function herschrijfDocx(origBlob, cvData, cand) {
  if (typeof JSZip === 'undefined') throw new Error('JSZip niet geladen');

  // Zorg dat JSZip altijd een ArrayBuffer krijgt (meest betrouwbaar)
  let zipInput = origBlob;
  if(origBlob instanceof Blob || origBlob instanceof File){
    zipInput = await origBlob.arrayBuffer();
  }
  const zip = await JSZip.loadAsync(zipInput);
  const docFile = zip.file('word/document.xml');
  if (!docFile) throw new Error('Geen word/document.xml gevonden in dit bestand');

  let xml = await docFile.async('string');

  // Vervang naam / functietitel
  if (cvData.oud_functietitel && cvData.functietitel) {
    xml = xmlReplaceText(xml, cvData.oud_functietitel, cvData.functietitel);
  }
  // Voeg ook cand.naam vervangingen toe indien naamvorm anders is
  if (cvData.naam_weergave && cvData.naam_weergave !== cand.naam) {
    xml = xmlReplaceText(xml, cand.naam, cvData.naam_weergave);
  }

  // Vervang kopprofiel
  if (cvData.oud_kopprofiel && cvData.kopprofiel) {
    xml = xmlReplaceText(xml, cvData.oud_kopprofiel, cvData.kopprofiel);
  }

  // Vervang kernkwaliteiten (1-op-1 per item)
  const oudKK = cvData.oud_kernkwaliteiten || [];
  const nieuwKK = cvData.kernkwaliteiten || [];
  for (let k = 0; k < Math.min(oudKK.length, nieuwKK.length); k++) {
    if (oudKK[k] && nieuwKK[k]) {
      xml = xmlReplaceText(xml, oudKK[k], nieuwKK[k]);
    }
  }

  // Vervang per ervaringsregel: functietitel + taken
  for (const erv of (cvData.ervaring || [])) {
    // Functietitel per functie (bv Product Owner -> Business Analist)
    if (erv.oud_functie && erv.functie && erv.oud_functie !== erv.functie) {
      xml = xmlReplaceText(xml, erv.oud_functie, erv.functie);
    }
    // Taken en verantwoordelijkheden
    const oudPunten = erv.oud_punten || [];
    const nieuwPunten = erv.punten || [];
    for (let p = 0; p < Math.min(oudPunten.length, nieuwPunten.length); p++) {
      if (oudPunten[p] && nieuwPunten[p] && oudPunten[p] !== nieuwPunten[p]) {
        xml = xmlReplaceText(xml, oudPunten[p], nieuwPunten[p]);
      }
    }
  }

  zip.file('word/document.xml', xml);
  const blob = await zip.generateAsync({
    type: 'blob',
    mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
  });
  return blob;
}

function makePDF(cvData,cand,req){
 const{jsPDF}=window.jspdf;
 const doc=new jsPDF({unit:'pt',format:'a4'});
 const W=doc.internal.pageSize.getWidth(),M=48;let y=64;
 const moss=[47,71,51],ink=[22,32,28],soft=[92,107,120];
 const nl=(c=[207,199,180])=>{doc.setDrawColor(...c);doc.setLineWidth(.7);doc.line(M,y,W-M,y);y+=14;};
 const tx=(t,sz,col,st='normal',lh=14,x=M,mw=W-2*M)=>{
  if(!t)return;doc.setFont('helvetica',st);doc.setFontSize(sz);doc.setTextColor(...col);
  doc.splitTextToSize(String(t),mw).forEach(l=>{if(y>780){doc.addPage();y=64;}doc.text(l,x,y);y+=lh;});
 };
 const hd=t=>{y+=6;tx(t.toUpperCase(),10,moss,'bold',13);y+=2;nl();};
 // Header
 doc.setFont('helvetica','bold');doc.setFontSize(22);doc.setTextColor(...ink);
 if(y>780){doc.addPage();y=64;}doc.text(cvData.naam_weergave||cand.naam,M,y);y+=8;
 tx(`${cand.senioriteit} - ${cvData.functietitel||req.functietitel||""}`,11,soft,"normal",15);y+=4;
 if(SETTINGS.bedrijf){doc.setFontSize(9);doc.setTextColor(...moss);doc.text(`Voorgesteld door ${SETTINGS.bedrijf}`,M,y);y+=10;}
 nl(moss);
 hd('Profiel');tx(cvData.kopprofiel||cand.profiel||'',10.5,ink,'normal',15);y+=4;
 if(cvData.kernkwaliteiten?.length){hd('Kernkwaliteiten');cvData.kernkwaliteiten.forEach(k=>{if(y>770){doc.addPage();y=64;}doc.setFillColor(...moss);doc.circle(M+2,y-3,1.6,'F');tx(k,10.5,ink,'normal',14,M+12,W-2*M-12);});y+=4;}
 if(cvData.skills?.length){hd('Vaardigheden');tx(cvData.skills.join(' · '),10.5,ink,'normal',15);y+=4;}
 if(cvData.ervaring?.length){hd('Werkervaring');cvData.ervaring.forEach(e=>{
  if(y>740){doc.addPage();y=64;}
  doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(...ink);doc.text(e.functie||'',M,y);
  doc.setFont('helvetica','normal');doc.setFontSize(9.5);doc.setTextColor(...soft);doc.text(e.periode||'',W-M,y,{align:'right'});y+=14;
  tx(e.org||'',10,soft,'italic',13);y+=1;
  (e.punten||[]).forEach(p=>{if(y>770){doc.addPage();y=64;}doc.setFillColor(...soft);doc.circle(M+2,y-3,1.4,'F');tx(p,10,ink,'normal',13.5,M+12,W-2*M-12);});y+=7;
 });}
 if(cvData.toelichting_eisen?.length){hd('Toelichting op eisen');cvData.toelichting_eisen.forEach(t=>{if(y>760){doc.addPage();y=64;}tx('• '+t.eis,10,moss,'bold',13.5);tx(t.hoe,10,ink,'normal',13.5,M+12,W-2*M-12);y+=3;});}
 if(cvData.opleiding?.length){hd('Opleiding');cvData.opleiding.forEach(o=>{if(y>775){doc.addPage();y=64;}tx(`${o.jaar} - ${o.titel}, ${o.org}`,10.5,ink,'normal',14);});}
 return doc;
}

4. Verwijs naar het bijgevoegde CV maar kopieer de inhoud niet in de mail.
5. Sluit af met de opgegeven ondertekening.
Antwoord ALLEEN geldige JSON.`;
 const s=SETTINGS;
 const usr=`STIJL: ${s.stijlinstructie||'Professioneel, concreet, kort.'}
AFZENDER: ${s.afzender_naam||'[naam]'}${s.afzender_functie?', '+s.afzender_functie:''}${s.bedrijf?', '+s.bedrijf:''}${s.afzender_telefoon?' · '+s.afzender_telefoon:''}
ONDERTEKENING: ${s.ondertekening||'Met vriendelijke groet,'}
AAN: ${req.van} (afzender originele aanvraag)

AANVRAAG: ${req.functietitel} | ${req.opdrachtgever||''} | ${req.locatie||''}
Gevraagd: ${(req.gevraagde_documenten||[]).join(', ')||'CV'}
Eisen: ${(req.eisen||[]).slice(0,5).join(' | ')}

KANDIDAAT: ${cvData.naam_weergave||cand.naam} | €${cand.tarief} | beschikbaar ${cand.beschikbaar}
Profiel: ${cvData.kopprofiel||cand.profiel||''}

CV gaat als PDF-bijlage mee. Verwijs ernaar maar kopieer de inhoud niet in de mail.
JSON: {"onderwerp":str,"body":str}`;
 return pj(await claude(sys,usr,1200));
}

/* ═══════════════════════════════════════════════

function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
let _tt=null;
function toast(msg,loading){
 const t=document.getElementById('toast');
 t.innerHTML=(loading?'<span class="spin"></span> ':'')+esc(msg);
 t.classList.add('show');clearTimeout(_tt);
 if(!loading)_tt=setTimeout(()=>t.classList.remove('show'),2800);
}
function dlInfo(d){
 if(!d)return{txt:'-',soon:false};
 let dt=null,m=d.match(/(\d{1,2})[-\/](\d{1,2})[-\/](\d{2,4})/);
 if(m){let y=+m[3];if(y<100)y+=2000;dt=new Date(y,+m[2]-1,+m[1]);}
 else if(/^\d{4}-\d{2}-\d{2}/.test(d))dt=new Date(d);
 if(!dt||isNaN(dt))return{txt:d,soon:false};
 const days=Math.ceil((dt-new Date('2026-06-11'))/864e5);
 return{txt:dt.toLocaleDateString('nl-NL',{day:'numeric',month:'short'})+(days>=0?` (${days}d)`:' verlopen'),soon:days<=5&&days>=0};
}

function wireUploadZone(){

 if(!drop)return;
 drop.onclick=()=>inp.click();
 drop.ondragover=e=>{e.preventDefault();drop.classList.add('over');};
 drop.ondragleave=()=>drop.classList.remove('over');
 drop.ondrop=e=>{e.preventDefault();drop.classList.remove('over');handleMailFiles(e.dataTransfer.files);};
 inp.onchange=e=>handleMailFiles(e.target.files);

async function handleMailFiles(files){
 toast('Bestanden inlezen…',true);
 let added=0;
 for(const f of files){
  try{
   if(f.name.toLowerCase().endsWith('.zip')){
    const mails=await extractZip(f);mails.forEach(m=>{PENDING_MAILS.push(m);added++;});
   } else {
    PENDING_MAILS.push(await parseMail(f));added++;
   }
  }catch(e){toast('Kon '+f.name+' niet lezen: '+e.message);}
 }
 toast(`${added} mail${added===1?'':'s'} toegevoegd.`);
 renderView();
}
function togglePendingMail(i,checked){if(!checked)PENDING_MAILS[i]._skip=true;else delete PENDING_MAILS[i]._skip;}

/* BATCH ANALYSE */
async function startBatchAnalyse(){
 const toProcess=PENDING_MAILS.filter(m=>!m._skip);
 if(!toProcess.length){toast('Geen mails geselecteerd.');return;}
 if(!claudeKey()){toast('Vul je Claude API-sleutel in (links in de sidebar).');return;}
 const btn=document.getElementById('btnAnalyse');
 if(btn){btn.disabled=true;btn.innerHTML=`<span class="spin"></span> Filteren (${toProcess.length} mails)…`;}
 try{
  // Stap 1: quick filter
  toast('Stap 1/2 - snel filteren op relevantie…',true);
  const filterResults=await quickFilter(toProcess);
  const relevante=toProcess.filter((_,i)=>{const fr=filterResults.find(r=>r.index===i);return fr&&fr.relevant;});
  const irrelevante=toProcess.filter((_,i)=>{const fr=filterResults.find(r=>r.index===i);return!fr||!fr.relevant;});
  // Sla niet-relevante direct op als afgewezen
  for(const m of irrelevante){
   const fr=filterResults.find(r=>r.index===toProcess.indexOf(m));
   const rec={id:'r_'+m.id,mail_id:m.id,van:m.from,ontvangen:m.received,onderwerp:m.subject,body:m.body,is_relevant:false,role_type:'overig',functietitel:m.subject,samenvatting:fr?.reden||'Niet relevant',status:'afgewezen',eisen:[],wensen:[],gevraagde_documenten:[]};
   await DB.upsertAanvraag(rec);
  }
  // Stap 2: volledige analyse van relevante mails
  let done=0;
  const newReqs=[];
  for(const m of relevante){
   toast(`Stap 2/2 - analyseren ${++done}/${relevante.length}…`,true);
   try{
    const a=await analyseMail(m);
    const rec={id:'r_'+m.id,mail_id:m.id,van:m.from,ontvangen:m.received,onderwerp:m.subject,body:m.body,...a,status:'geanalyseerd',duplicate_of:null,matches:null};
    newReqs.push(rec);
    await DB.upsertAanvraag(rec);
   }catch(e){toast('Analyse mislukt voor: '+m.subject);}
  }
  // Dedup op nieuwe + bestaande
  detectDups([...AANVRAGEN,...newReqs]);
  for(const r of newReqs.filter(r=>r.duplicate_of)) await DB.upsertAanvraag(r);
  // Reload
  AANVRAGEN=await DB.getAanvragen();
  PENDING_MAILS=PENDING_MAILS.filter(m=>m._skip);
  toast(`Klaar: ${relevante.length} relevant, ${irrelevante.length} niet-relevant.`);
  setView('aanvragen');
 }catch(err){toast('Fout: '+err.message);if(btn){btn.disabled=false;btn.textContent='Opnieuw proberen';}}
}

function renderAanvragen(){
 if(!AANVRAGEN.length)return`<div class="empty"><div class="big">Nog geen aanvragen</div>Upload en analyseer mails via het Mails-tabblad.</div>`;
 const rel=AANVRAGEN.filter(r=>r.is_relevant&&!r.duplicate_of);
 const dups=AANVRAGEN.filter(r=>r.duplicate_of);
 const irrel=AANVRAGEN.filter(r=>!r.is_relevant);
 let h=`<div class="section-label">Relevant - ${rel.length}</div><div class="card">${rel.map(reqRow).join('')||'<div class="empty">Geen</div>'}</div>`;
 if(dups.length){h+=`<div class="section-label">Mogelijke duplicaten - ${dups.length}</div><div class="card">${dups.map(r=>{const o=AANVRAGEN.find(x=>x.id===r.duplicate_of);return`<div class="row"><span class="pill pill-dup">DUPL</span><div class="body" style="margin-left:8px;cursor:pointer" onclick="openReqDrawer('${r.id}')"><div class="title">${esc(r.functietitel||r.onderwerp)}</div><div class="meta"><span>lijkt op: ${esc(o?.functietitel||'')}</span><span>${esc(r.van)}</span></div></div><div class="right"><button class="btn danger sm" onclick="event.stopPropagation();verwijderAanvraag('${r.id}')">Verwijderen</button></div></div>`;}).join('')}</div>`;}
 if(irrel.length){h+=`<div class="section-label">Niet-relevant - ${irrel.length}</div><div class="card">${irrel.map(r=>`<div class="row" style="opacity:.7"><span class="role-tag role-overig">Genegeerd</span><div class="body" style="margin-left:8px;cursor:pointer" onclick="openReqDrawer('${r.id}')"><div class="title">${esc(r.onderwerp)}</div><div class="meta"><span>${esc(r.samenvatting||'')}</span></div></div><div class="right"><button class="btn danger sm" onclick="event.stopPropagation();verwijderAanvraag('${r.id}')">Verwijderen</button></div></div>`).join('')}</div>`;}
 return h;
}
function reqRow(r){
 const rt=r.role_type||'overig', dl=dlInfo(r.deadline);
 const mc=r.matches ? JSON.parse(r.matches||'[]').length : null;
 const statusLabel=(r.status||'nieuw').replace(/_/g,' ');
 const matchSpan=mc!==null ? '<span style="font-size:11px;color:var(--moss)">'+mc+' match'+(mc===1?'':'es')+'</span>' : '';
 const dlSpan='<span class="dl '+(dl.soon?'soon':'')+'">&#9201; '+esc(dl.txt)+'</span>';
 const delBtn='<button class="btn danger sm" onclick="event.stopPropagation();verwijderAanvraag(&quot;'+r.id+'&quot;)">Verwijderen</button>';
 const meta=[
  r.opdrachtgever ? '<b>'+esc(r.opdrachtgever)+'</b>' : '',
  r.locatie ? esc(r.locatie) : '',
  r.uren_per_week ? esc(r.uren_per_week) : '',
  r.tarief_max ? 'max '+esc(r.tarief_max) : '',
  '<span>via '+esc((r.van||'').split('@').pop())+'</span>'
 ].filter(Boolean).join(' ');
 const portalBadge = r.bron==='portal'
  ? '<span style="font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.07em;padding:3px 8px;border-radius:5px;border:1px solid #b3b3d1;background:#e8e8f2;color:#4a4a6b;white-space:nowrap">Portal</span> '
  : '';
 return '<div class="row">'
  const opgepaktBadge = r.opgepakt_door ? '<span style="font-size:10px;font-family:var(--mono);background:var(--moss);color:#fff;padding:2px 8px;border-radius:20px;white-space:nowrap">'+esc(r.opgepakt_door)+'</span>' : '';
  +portalBadge+'<span class="role-tag role-'+rt+'">'+( ROLE_LABELS[rt]||'Overig')+'</span>'
  +'<div class="body" style="cursor:pointer" onclick="openReqDrawer(&quot;'+r.id+'&quot;)">'
   +'<div class="title">'+esc(r.functietitel||r.onderwerp)+'</div>'
   +'<div class="meta">'+meta+'</div>'
  +'</div>'
  +'<div class="right">'
   +'<span class="pill pill-'+(r.status||'nieuw')+'">'+statusLabel+'</span>'
   +matchSpan+dlSpan+delBtn
  +'</div>'
 +'</div>';
}

function renderKandidaten(){
  if(!CANDIDATES.length) return '<div class="empty"><div class="big">Nog geen kandidaten</div>Voeg een kandidaat toe of upload meerdere CVs tegelijk via de knop rechtsboven.</div>';
  // Render kaartjes - CV-versies worden async geladen per kaart
  let h = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px">';
  CANDIDATES.forEach(c=>{
    const hasBron = !!(c.cv_bron?.tekst);
    const kalEntries = KALENDER.filter(e=>e.kandidaat_id===c.id);
    const beschikbaarLabel = kalEntries.length
      ? kalEntries.map(e=>MAAND_NAMEN[e.maand-1]+' '+e.jaar+(e.rol?' ('+e.rol+')':'')).join(', ')
      : (c.beschikbaar || 'onbekend');
    const nu = new Date();
    const beschikbaarDt = c.beschikbaar ? new Date(c.beschikbaar) : null;
    const isBeschikbaar = beschikbaarDt && beschikbaarDt <= new Date(nu.getFullYear(), nu.getMonth()+1, 1);
    const statusKleur = isBeschikbaar
      ? 'background:#e3eee4;color:#2f4733;border-color:#a9c4ad'
      : 'background:#fbf3df;color:#8a6a18;border-color:#d9c08a';
    const statusLabel = isBeschikbaar ? 'Beschikbaar' : 'Ingepland';

    h += '<div class="card" style="overflow:visible">';
    // Header
    h += '<div style="padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:10px">';
    h += '<div style="flex:1;min-width:0">';
    h += '<div style="font-weight:700;font-size:15px;margin-bottom:2px">'+esc(c.naam)+'</div>';
    h += '<div style="font-size:12px;color:var(--ink-soft)">'+esc(c.senioriteit)+' · EUR '+esc(c.tarief||'?')+'/u · '+esc(c.locatie||'?')+'</div>';
    h += '</div>';
    h += '<span style="font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid;white-space:nowrap;'+statusKleur+'">'+statusLabel+'</span>';
    h += '</div>';

    // Beschikbaarheid
    h += '<div style="padding:10px 16px;border-bottom:1px solid var(--paper-2);font-size:12px;display:flex;gap:6px;align-items:center">';
    h += '<span style="color:var(--ink-soft);font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em">Beschikbaar</span>';
    h += '<span style="font-weight:600">'+esc(beschikbaarLabel)+'</span>';
    h += '</div>';

    // CV-versies per rol
    h += '<div style="padding:10px 16px;border-bottom:1px solid var(--paper-2)" id="rolcv_kaart_'+c.id+'">';
    h += '<div style="font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);margin-bottom:8px">CV versies per rol</div>';
    h += '<div id="rolcv_kaart_items_'+c.id+'"><div style="font-size:12px;color:var(--slate)">Laden...</div></div>';
    h += '</div>';

    // Skills
    h += '<div style="padding:10px 16px;border-bottom:1px solid var(--paper-2)">';
    h += '<div class="chips">'+((c.skills||[]).slice(0,8).map(s=>'<span class="chip">'+esc(s)+'</span>').join(''))+'</div>';
    h += '</div>';

    // Acties
    h += '<div style="padding:10px 16px;display:flex;gap:7px;flex-wrap:wrap">';
    h += '<button class="btn ghost sm" onclick="openCandidateDrawer(&quot;'+c.id+'&quot;)">Bewerken</button>';
    if(hasBron) h += '<button class="btn ghost sm" onclick="quickViewCV(&quot;'+c.id+'&quot;)">CV bekijken</button>';
    h += '<button class="btn danger sm" style="margin-left:auto" onclick="verwijderKandidaat(&quot;'+c.id+'&quot;,&quot;'+esc(c.naam)+'&quot;)">Verwijderen</button>';
    h += '</div>';
    h += '</div>';
  });
  h += '</div>';

  // Laad CV-versies async na render
  setTimeout(()=>{
    CANDIDATES.forEach(c=>{
      if(!c.id.startsWith('c_')) laadRolCVKaart(c.id);
    });
  }, 100);

  return h;
}

async function laadRolCVKaart(candId){
  const el = document.getElementById('rolcv_kaart_items_'+candId);
  if(!el) return;
  try{
    const versies = await DB.getCVVersiesVanKandidaat(candId);
    const rolVersies = versies.filter(v=>v.roltype);
    if(!rolVersies.length){
      el.innerHTML='<div style="font-size:12px;color:var(--slate)">Nog geen rol-CVs. Voeg toe via Bewerken.</div>';
      return;
    }
    // Groepeer per roltype - toon alleen laatste versie per rol
    const perRol = {};
    rolVersies.forEach(v=>{ perRol[v.roltype] = v; }); // laatste wint
    el.innerHTML = Object.entries(perRol).map(([rol, v])=>`
      <div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--paper-2)">
        <span style="font-family:var(--mono);font-size:10px;background:var(--paper-2);padding:2px 8px;border-radius:4px;white-space:nowrap">${esc(rol)}</span>
        <span style="font-size:12px;flex:1;color:var(--ink-soft)">${esc(v.versie_naam||'CV.docx')}</span>
        <button class="btn ghost sm" onclick="downloadRolCV('${candId}','${esc(rol)}')">Download</button>
      </div>`).join('');
  }catch(e){ if(el) el.innerHTML='<div style="font-size:12px;color:var(--rust)">'+esc(e.message)+'</div>'; }
}

async function downloadRolCV(candId, roltype){
  try{
    toast('CV ophalen...', true);
    const path = 'rolcv/'+candId+'/'+roltype.replace(/[^a-zA-Z0-9]/g,'_')+'.docx';
    const{data,error}=await sb.storage.from('cv-bestanden').createSignedUrl(path,300);
    if(error||!data){ toast('CV niet gevonden in storage.'); return; }
    window.open(data.signedUrl,'_blank');
    toast('CV geopend.');
  }catch(e){ toast('Fout: '+e.message); }
}

let PB = {
 aanvraagTekst: '',
 parsed: null,    // geanalyseerde aanvraag
 matches: [],     // matchresultaten
 geselecteerd: [],  // gekozen kandidaat-ids
 resultaten: {},   // per kandidaat-id: {cvData, pdf, opmerking, docData, docFilename}
 docFile: null,    // geüpload aanbiedingsdocument (raw tekst)
 docFilename: ''
};

/* ── Render ── */
function renderPortalBuddy(){
 const el = document.getElementById('view');
 el.innerHTML = buildPBHtml();
 wirePBDoc();
}

function buildPBHtml(){
 const p = PB.parsed;
 let h = '';

 // ── Stap 1: aanvraag plakken ──
 h += '<div class="section-label" style="margin-top:0">Stap 1 - Plak de aanvraag uit het portal</div>';
 h += '<div class="panel">';
 h += '<div class="field"><label>Aanvraag tekst</label>';
 h += '<textarea id="pb_tekst" rows="10" style="font-size:13px;line-height:1.55" placeholder="Plak hier de volledige aanvraag tekst uit het portal...">' + esc(PB.aanvraagTekst) + '</textarea></div>';
 h += '<div style="display:flex;gap:8px;align-items:center">';
 h += '<button class="btn" onclick="pbAnalyse()">Analyseren</button>';
 if(p){
  h += '<span style="font-size:12px;color:var(--moss)">Geanalyseerd: <b>' + esc(p.functietitel||'') + '</b></span>';
  const alOpgeslagen = PB.reqId && AANVRAGEN.find(a=>a.id===PB.reqId);
  h += '<button class="btn ghost sm" onclick="pbVoegToeAanAanvragen()" '+(alOpgeslagen?"disabled":"")+' style="margin-left:auto">'+(alOpgeslagen?"Toegevoegd aan aanvragen":"Toevoegen aan aanvragen (Portal)")+'</button>';
 }
 h += '</div></div>';
 if(!p) return h;

 // ── Geanalyseerde aanvraag tonen ──
 h += '<div class="section-label">Aanvraag - gestructureerd</div>';
 h += '<div class="panel"><dl class="kv">';
 h += '<dt>Functietitel</dt><dd>' + esc(p.functietitel||'-') + '</dd>';
 h += '<dt>Opdrachtgever</dt><dd>' + esc(p.opdrachtgever||'-') + '</dd>';
 h += '<dt>Locatie</dt><dd>' + esc(p.locatie||'-') + '</dd>';
 h += '<dt>Start</dt><dd>' + esc(p.startdatum||'-') + '</dd>';
 h += '<dt>Duur</dt><dd>' + esc(p.duur||'-') + '</dd>';
 h += '<dt>Uren/week</dt><dd>' + esc(p.uren_per_week||'-') + '</dd>';
 h += '<dt>Max tarief</dt><dd>' + esc(p.tarief_max||'-') + '</dd>';
 h += '<dt>Deadline</dt><dd>' + esc(p.deadline||'-') + '</dd>';
 h += '</dl>';
 if((p.eisen||[]).length){
  h += '<div style="margin-top:10px"><b style="font-size:12px">Eisen</b><div class="chips">'
    + p.eisen.map(e=>'<span class="chip req">' + esc(e) + '</span>').join('') + '</div></div>';
 }
 if((p.wensen||[]).length){
  h += '<div style="margin-top:8px"><b style="font-size:12px">Wensen</b><div class="chips">'
    + p.wensen.map(e=>'<span class="chip">' + esc(e) + '</span>').join('') + '</div></div>';
 }
 h += '</div>';

 // ── Stap 2: matching ──
 h += '<div class="section-label">Stap 2 - Kandidaten selecteren</div>';
 if(!PB.matches.length){
  h += '<div class="panel"><button class="btn" onclick="pbMatch()">Matchen met Claude (' + CANDIDATES.length + ' kandidaten)</button>'
    + '<p style="font-size:12px;color:var(--slate);margin-top:8px">Claude scoort alle kandidaten op deze aanvraag.</p></div>';
 } else {
  h += '<div class="panel"><p style="font-size:12px;color:var(--ink-soft);margin-top:0">Selecteer één of meer kandidaten om voor te stellen.</p>';
  h += PB.matches.map((m,i) => pbMatchCard(m,i)).join('');
  if(PB.geselecteerd.length){
   h += '<div style="margin-top:14px;padding-top:14px;border-top:1px dashed var(--line)">'
     + '<button class="btn" onclick="pbGenereer()">CVs herschrijven voor geselecteerde kandidaten (' + PB.geselecteerd.length + ')</button></div>';
  }
  h += '</div>';
 }

 // ── Stap 3: aanbiedingsdocument ──
 h += '<div class="section-label">Stap 3 - Aanbiedingsdocument (optioneel)</div>';
 h += '<div class="panel">';
 h += '<p style="font-size:12.5px;color:var(--ink-soft);margin-top:0">Upload het blanco aanbiedingsdocument van de klant of broker (Excel of Word). De app vult het in op basis van de aanvraag en het kandidaatprofiel en geeft het terug in hetzelfde formaat.</p>';
 h += '<div class="upload-zone" id="pbDocDrop">' + (PB.docFilename ? 'Huidig: <b>' + esc(PB.docFilename) + '</b> - klik om te vervangen' : 'Sleep hier het blanco aanbiedingsdocument (.docx, .xlsx, .xls, .txt) of klik') + '</div>';
 h += '<input type="file" id="pbDocInput" accept=".docx,.xlsx,.xls,.txt,.pdf" style="display:none">';
 if(PB.docFilename){
  h += '<div class="filechip">' + esc(PB.docFilename) + ' <span class="x" onclick="pbClearDoc()">&#215;</span></div>';
 }
 h += '</div>';

 // ── Stap 4: resultaten ──
 if(Object.keys(PB.resultaten).length){
  h += '<div class="section-label">Stap 4 - Resultaten</div>';
  PB.geselecteerd.forEach(cid => {

   if(!cand) return;
   h += pbResultCard(cand, res);
  });
 }

 return h;
}

function pbMatchCard(m, i){
 const c = CANDIDATES.find(x=>x.id===m.candidate_id);
 if(!c) return '';
 const sel = PB.geselecteerd.includes(c.id);
 const cls = m.score>=70?'':m.score>=45?'mid':'low';
 return '<div class="match" style="' + (sel?'border-color:var(--moss);background:#f4f9f4':'') + '">'
  + '<div class="match-top">'
   + '<div class="score-ring ' + cls + '" style="--p:' + m.score + '"><span>' + m.score + '</span></div>'
   + '<div style="flex:1">'
    + '<div style="font-weight:700;font-size:14px">' + esc(c.naam) + '</div>'
    + '<div style="font-size:12px;color:var(--ink-soft)">' + (c.rollen||[]).join(' · ') + ' · &euro;' + c.tarief + ' · beschikbaar ' + esc(c.beschikbaar||'?') + '</div>'
   + '</div>'
   + '<button class="btn ' + (sel?'danger':'ghost') + ' sm" onclick="pbToggle(\'' + c.id + '\')">'
    + (sel ? 'Deselecteer' : 'Selecteer')
   + '</button>'
  + '</div>'
  + '<div class="reasoning">'
   + '<div class="col pro"><h4>Passend</h4><ul>' + (m.pro||[]).map(x=>'<li>'+esc(x)+'</li>').join('') + '</ul></div>'
   + '<div class="col risk"><h4>Risico</h4><ul>' + (m.risico||[]).map(x=>'<li>'+esc(x)+'</li>').join('') + '</ul></div>'
   + '<div class="col covered"><h4>Eisen afgedekt</h4><ul>' + (m.eisen_afgedekt||[]).map(x=>'<li>'+esc(x)+'</li>').join('') + '</ul></div>'
   + '<div class="col missing"><h4>Ontbreekt</h4><ul>' + (m.ontbreekt||[]).map(x=>'<li>'+esc(x)+'</li>').join('') + '</ul></div>'
  + '</div>'
 + '</div>';
}

function pbResultCard(cand, res){
 if(res.fout){
  return '<div class="panel" id="pbres_'+cand.id+'">'+'<h3>'+esc(cand.naam)+'</h3>'+'<div class="banner warn">'+esc(res.fout)+' <label style="cursor:pointer;text-decoration:underline">Klik hier om .docx te uploaden<input type="file" accept=".docx" style="display:none" onchange="pbInlineUpload(event,&quot;'+cand.id+'&quot;)"></label></div></div>';
 }
 const sigs = (res.cvData&&res.cvData.signalen)||[];
 return '<div class="panel" id="pbres_' + cand.id + '">'
  + '<h3>' + esc(cand.naam) + '</h3>'
  + (sigs.length ? '<div class="banner warn">Te checken: ' + sigs.map(esc).join(' · ') + '</div>' : '')

  // Leveranciersopmerking
  + '<div class="field" style="margin-bottom:14px">'
   + '<label>Leveranciersopmerking <span style="font-weight:400;color:var(--slate)">(informeel, apart vak - niet in CV of document)</span></label>'

   + '<button class="btn ghost sm" style="margin-top:6px" onclick="pbGenereerOpmerking(\'' + cand.id + '\')">Genereer opmerking</button>'
  + '</div>'

  // CV download
  + '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">'
   + '<button class="btn sm" onclick="pbDownloadCVWord(\'' + cand.id + '\')">Word downloaden</button>'
  + '</div>'
  + '<div id="pbcvprev_' + cand.id + '"></div>'

     + '<div class="banner info" style="font-size:12px">Persoonlijke gegevens (BSN, adres, geboortedatum etc.) zijn bewust leeggelaten - vul die zelf in voor verzending.</div>'
     + '<span class="attach" onclick="pbDownloadDoc(\'' + cand.id + '\')">' + esc(res.docFilename||'Aanbieding.txt') + '</span>'
    + '</div>'
   : (PB.docFile

     : '<span style="font-size:12px;color:var(--slate)">Geen aanbiedingsdocument geüpload (optioneel).</span>')
  )
  // Toevoegen aan concepten
  + '<div style="margin-top:16px;padding-top:14px;border-top:1px dashed var(--line);display:flex;gap:8px;align-items:center;flex-wrap:wrap">'
   + '<button class="btn' + (res.toegevoegdAanConcepten ? ' ghost' : '') + '" onclick="pbNaarConcepten(\'' + cand.id + '\')" ' + (res.toegevoegdAanConcepten ? 'disabled' : '') + '>'
    + (res.toegevoegdAanConcepten ? 'Toegevoegd aan concepten' : 'Toevoegen aan concepten')
   + '</button>'
   + '<span style="font-size:11.5px;color:var(--slate)">Slaat het CV en de opmerking op als concept voor verdere verwerking.</span>'
  + '</div>'
 + '</div>';

// Maak een .docx bestand van plain tekst via docx library
async function maakDocx(tekst){
 // Gebruik de docx library als die beschikbaar is, anders fallback naar blob
 if(typeof docx !== 'undefined'){
  try{
   const regels = tekst.split('\n');
   const paragrafen = regels.map(r => new docx.Paragraph({
    children:[new docx.TextRun({text:r||' ', size:22, font:'Calibri'})],
    spacing:{after:120}
   }));
   const doc = new docx.Document({sections:[{children:paragrafen}]});
   const buf = await docx.Packer.toBlob(doc);
   return buf;
  }catch(e){ /* fallback */ }
 }
 // Fallback: maak een eenvoudig .docx compatible XML pakket
 const escaped = tekst.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
 const regels = escaped.split('\n');
 const paraXml = regels.map(r=>`<w:p><w:r><w:t xml:space="preserve">${r||' '}</w:t></w:r></w:p>`).join('');
 const docXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
<w:body>${paraXml}<w:sectPr/></w:body></w:document>`;
 // Minimale .docx zip structuur
 if(typeof JSZip !== 'undefined'){
  const zip = new JSZip();
  zip.file('[Content_Types].xml', `<?xml version="1.0" encoding="UTF-8"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/></Types>`);
  zip.file('_rels/.rels', `<?xml version="1.0" encoding="UTF-8"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/></Relationships>`);
  zip.file('word/document.xml', docXml);
  zip.file('word/_rels/document.xml.rels', `<?xml version="1.0" encoding="UTF-8"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"></Relationships>`);
  const blob = await zip.generateAsync({type:'blob', mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
  return blob;
 }
 // Laatste fallback: rtf
 const rtf = '{\\rtf1\\ansi\n' + regels.map(r=>r+'\\par\n').join('') + '}';
 return new Blob([rtf], {type:'application/rtf'});
}

// Maak een .xlsx bestand van plain tekst via SheetJS
function maakXlsx(tekst, origTekst){
 if(typeof XLSX === 'undefined'){
  return new Blob([tekst], {type:'text/plain;charset=utf-8'});
 }
 const regels = tekst.split('\n').map(r=>[r]);
 const ws = XLSX.utils.aoa_to_sheet(regels);
 const wb = XLSX.utils.book_new();
 XLSX.utils.book_append_sheet(wb, ws, 'Aanbieding');
 const buf = XLSX.write(wb, {bookType:'xlsx', type:'array'});
 return new Blob([buf], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
}

function renderBatchDrawer(){
  const body = document.getElementById('dBody');

  const wacht = BATCH.bestanden.filter(b=>b.status==='wacht');
  const bezig = BATCH.bestanden.filter(b=>b.status==='parsend').length;

  let h = '';

  // Upload zone
  h += '<div class="upload-zone" id="batchDrop" style="margin-bottom:16px">';
  h += '<strong>Sleep hier CV-bestanden</strong><br>';
  h += 'Word-documenten (.docx) - meerdere tegelijk. Elk bestand wordt een aparte kandidaat.';
  h += '</div>';
  h += '<input type="file" id="batchInput" multiple accept=".docx" style="display:none">';

  if(BATCH.bestanden.length){
    h += '<div style="display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap">';
    if(wacht.length){
      h += '<button class="btn" onclick="batchParseer()">Analyseren met Claude (' + wacht.length + ' CVs)</button>';

    h += '</div>';

    // Kaartjes per bestand
    BATCH.bestanden.forEach((b,i) => { h += batchKaartje(b,i); });
  }

  body.innerHTML = h;
