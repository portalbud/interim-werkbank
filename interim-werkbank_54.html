function batchKaartje(b, i){
  const p = b.parsed;
  const statusKleur = {
    wacht: 'color:var(--slate);background:#f0f0ec;border-color:#ccc',
    parsend: 'color:#8a6a18;background:#fbf3df;border-color:#d9c08a',
    klaar: 'color:var(--moss-deep);background:#e3eee4;border-color:#a9c4ad',
    fout: 'color:var(--rust);background:#f6e4dc;border-color:#dba893'
  }[b.status] || '';
  const statusLabel = {wacht:'Wacht',parsend:'Analyseren...',klaar:'Klaar',fout:'Fout'}[b.status]||b.status;

  let h = '<div class="panel" id="bk_'+i+'" style="margin-bottom:12px">';

  // Bestandsnaam + status + verwijderknop
  h += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:' + (p?'12':'0') + 'px">';
  h += '<span style="font-family:var(--mono);font-size:11px;padding:2px 9px;border-radius:5px;border:1px solid;' + statusKleur + '">' + statusLabel + '</span>';
  h += '<span style="font-weight:600;font-size:13px;flex:1">' + esc(b.file.name) + '</span>';
  if(b.status==='fout') h += '<span style="font-size:11.5px;color:var(--rust)">' + esc(b.foutmelding||'') + '</span>';
  h += '<button class="btn ghost sm" onclick="batchVerwijder(' + i + ')">Verwijderen</button>';
  h += '</div>';

  if(!p) return h + '</div>';

  // Bewerkbare velden op basis van geparste data
  h += '<div class="two-col">';
  h += veld('Naam', 'b_naam_'+i, p.naam||'', 'Volledige naam');
  h += veld('E-mail', 'b_email_'+i, p.email||'', 'emailadres@voorbeeld.nl');
  h += veld('Beschikbaar vanaf', 'b_besch_'+i, p.beschikbaar||'', 'bijv. 2026-07-01');
  h += veld('Tarief (EUR/uur)', 'b_tarief_'+i, p.tarief||'', '');
  h += veld('Locatie', 'b_loc_'+i, p.locatie||'', '');
  h += veld('Senioriteit', 'b_sen_'+i, p.senioriteit||'Medior', '', true,
    ['Junior','Medior','Senior','Lead']);
  h += '</div>';
  h += veldFull('Rollen (komma-gescheiden)', 'b_rollen_'+i, (p.rollen||[]).join(', '));
  h += veldFull('Skills (komma-gescheiden)', 'b_skills_'+i, (p.skills||[]).join(', '));
  h += veldFull('Sectorervaring (komma-gescheiden)', 'b_sect_'+i, (p.sectoren||[]).join(', '));
  h += veldFull('Profielschets', 'b_profiel_'+i, p.profiel||'', true);

  if(b.status==='klaar'){
    h += '<div style="margin-top:10px;display:flex;gap:8px">';
    h += '<button class="btn sm" onclick="batchOpslaanEen('+i+')">Opslaan als kandidaat</button>';
    if(b.opgeslagen) h += '<span style="font-size:12px;color:var(--moss);margin-top:8px">Opgeslagen</span>';
    h += '</div>';
  }

  h += '</div>';
  return h;
}

function veld(label, id, val, ph='', isSelect=false, opties=[]){
  if(isSelect){
    return '<div class="field"><label>' + label + '</label><select id="' + id + '">'
      + opties.map(o=>'<option'+(val===o?' selected':'')+'>'+o+'</option>').join('')
      + '</select></div>';
  }
  return '<div class="field"><label>' + label + '</label>'
    + '<input id="' + id + '" value="' + esc(val) + '" placeholder="' + esc(ph) + '"></div>';
}
function veldFull(label, id, val, isTextarea=false){
  if(isTextarea){
    return '<div class="field"><label>' + label + '</label>'
      + '<textarea id="' + id + '" rows="2">' + esc(val) + '</textarea></div>';
  }
  return '<div class="field"><label>' + label + '</label>'
    + '<input id="' + id + '" value="' + esc(val) + '"></div>';
}

function wireBatchUpload(){
  const drop = document.getElementById('batchDrop');
  const inp = document.getElementById('batchInput');
  if(!drop||!inp) return;
  drop.onclick = () => inp.click();
  drop.ondragover = e => {e.preventDefault(); drop.classList.add('over');};
  drop.ondragleave = () => drop.classList.remove('over');
  drop.ondrop = e => {e.preventDefault(); drop.classList.remove('over'); handleBatchFiles(e.dataTransfer.files);};
  inp.onchange = e => { handleBatchFiles(e.target.files); inp.value=''; };
}

async function handleBatchFiles(files){
  let toegevoegd = 0;
  for(const f of files){
    if(f.name.split('.').pop().toLowerCase() !== 'docx') continue;
    // Voorkom dubbele bestandsnamen
    if(BATCH.bestanden.some(b=>b.file.name===f.name)) continue;
    toast('Inlezen: ' + f.name + '...', true);
    try{
      const tekst = await extractFileText(f);
      const b64 = await fileToBase64(f).catch(()=>null);
      BATCH.bestanden.push({file:f, tekst:tekst.slice(0,9000), b64, status:'wacht', parsed:null, opgeslagen:false});
      toegevoegd++;
    }catch(e){ BATCH.bestanden.push({file:f, tekst:'', status:'fout', parsed:null, foutmelding:e.message, opgeslagen:false}); }
  }
  toast(toegevoegd + ' CV' + (toegevoegd===1?'':'s') + ' ingelezen.');
  renderBatchDrawer();
}

function batchVerwijder(i){
  BATCH.bestanden.splice(i,1);
  renderBatchDrawer();
}

async function batchParseer(){
  const wacht = BATCH.bestanden.filter(b=>b.status==='wacht');
  if(!wacht.length){toast('Geen CVs om te analyseren.');return;}
  if(!claudeKey()){toast('Vul je Claude API-sleutel in.');return;}

  const sys = 'Je extraheert gestructureerde kandidaatgegevens uit een CV-tekst. '
    + 'Houd je strikt aan wat er staat - verzin niets. Ontbrekende velden geef je als null of lege array. '
    + 'Geef punten in de ervaringslijst als korte feitelijke zinnen zonder clichés. '
    + 'Antwoord ALLEEN met geldige JSON zonder extra tekst of uitleg.';

  for(let i=0; i<BATCH.bestanden.length; i++){
    const b = BATCH.bestanden[i];
    if(b.status !== 'wacht') continue;
    b.status = 'parsend';
    renderBatchDrawer();
    try{
      // Saniteer de CV-tekst: verwijder tekens die JSON kunnen breken
      const cvTekst = b.tekst
        .replace(/[\x00-\x08\x0b\x0c\x0e-\x1f]/g, ' ')  // control chars
        .replace(/\r\n/g, '\n')
        .replace(/\t/g, ' ')
        .slice(0, 7000);  // limiet op input

      const usr = 'Parseer dit CV. Geef uitsluitend JSON in dit formaat:\n'
        + '{\n'
        + '  "naam": "string",\n'
        + '  "email": "string of null",\n'
        + '  "locatie": "string of null",\n'
        + '  "beschikbaar": "datum of null",\n'
        + '  "tarief": "getal of null",\n'
        + '  "senioriteit": "Junior of Medior of Senior of Lead",\n'
        + '  "rollen": ["string"],\n'
        + '  "skills": ["string"],\n'
        + '  "sectoren": ["string"],\n'
        + '  "profiel": "string",\n'
        + '  "motivatie": ["string"],\n'
        + '  "ervaring": [{"periode":"string","functie":"string","org":"string","punten":["string"]}],\n'
        + '  "opleiding": [{"jaar":"string","titel":"string","org":"string"}]\n'
        + '}\n\n'
        + 'CV TEKST:\n' + cvTekst;

      const raw = await claude(sys, usr, 2400);
      const r = pj(raw);
      // Normaliseer tarief naar getal
      if(r.tarief) r.tarief = parseFloat(String(r.tarief).replace(/[^0-9.,]/g,'').replace(',','.'))||null;
      // Zorg dat arrays altijd arrays zijn
      ['rollen','skills','sectoren','motivatie'].forEach(k=>{
        if(!Array.isArray(r[k])) r[k] = r[k] ? [String(r[k])] : [];
      });
      if(!Array.isArray(r.ervaring)) r.ervaring = [];
      if(!Array.isArray(r.opleiding)) r.opleiding = [];
      b.parsed = r;
      b.status = 'klaar';
    }catch(e){
      b.status = 'fout';
      b.foutmelding = e.message;
    }
    renderBatchDrawer();
    // Pauze tussen calls om rate-limit te vermijden
    await new Promise(res=>setTimeout(res,600));
  }
  toast('Analyse klaar.');
}

function batchLeesVelden(i){
  const p = BATCH.bestanden[i].parsed;
  if(!p) return null;
  return {
    naam:    document.getElementById('b_naam_'+i)?.value.trim()||'',
    email:   document.getElementById('b_email_'+i)?.value.trim()||null,
    locatie: document.getElementById('b_loc_'+i)?.value.trim()||null,
    beschikbaar: document.getElementById('b_besch_'+i)?.value.trim()||null,
    tarief:  parseFloat(document.getElementById('b_tarief_'+i)?.value)||null,
    senioriteit: document.getElementById('b_sen_'+i)?.value||'Medior',
    rollen:  document.getElementById('b_rollen_'+i)?.value.split(',').map(s=>s.trim()).filter(Boolean)||[],
    skills:  document.getElementById('b_skills_'+i)?.value.split(',').map(s=>s.trim()).filter(Boolean)||[],
    sectoren:document.getElementById('b_sect_'+i)?.value.split(',').map(s=>s.trim()).filter(Boolean)||[],
    profiel: document.getElementById('b_profiel_'+i)?.value.trim()||'',
    motivatie: p.motivatie||[],
    ervaring: p.ervaring||[],
    opleiding: p.opleiding||[],
    opmerkingen: '',
    cv_bron: {naam: BATCH.bestanden[i].file.name, tekst: BATCH.bestanden[i].tekst, b64: BATCH.bestanden[i].b64||null}
  };
}

async function batchOpslaanEen(i){
  const b = BATCH.bestanden[i];
  if(b.opgeslagen){toast('Al opgeslagen.');return;}
  const velden = batchLeesVelden(i);
  if(!velden||!velden.naam){toast('Naam is verplicht.');return;}
  const kandidaat = {
    id: 'c_' + Date.now() + '_' + i,
    ...velden,
    reisbereidheid: 50
  };
  try{
    // Upload rawBlob naar storage
    if(BATCH.bestanden[i]?.file && kandidaat.cv_bron){
      try{
        await DB.uploadBronCV(kandidaat.id, BATCH.bestanden[i].file);
        kandidaat.cv_bron.opgeslagen = true;
        kandidaat.cv_bron.rawBlob = null;
      }catch(upErr){ console.warn('Batch CV upload mislukt:', upErr.message); }
    }
    // Sla zonder rawBlob en b64 op
    if(kandidaat.cv_bron) kandidaat.cv_bron = {naam:kandidaat.cv_bron.naam, tekst:kandidaat.cv_bron.tekst, opgeslagen:!!kandidaat.cv_bron.opgeslagen};
    await DB.upsertKandidaat(kandidaat);
    CANDIDATES = await DB.getKandidaten();
    b.opgeslagen = true;
    toast(velden.naam + ' opgeslagen.');
    renderBatchDrawer();
    updateBadges();
  }catch(e){toast('Fout: '+e.message);}
}

async function batchOpslaanAlle(){
  const klaar = BATCH.bestanden.filter(b=>b.status==='klaar'&&!b.opgeslagen);
  if(!klaar.length){toast('Niets te opslaan.');return;}
  let opgeslagen = 0;
  for(let i=0; i<BATCH.bestanden.length; i++){
    const b = BATCH.bestanden[i];
    if(b.status!=='klaar'||b.opgeslagen) continue;
    const velden = batchLeesVelden(i);
    if(!velden||!velden.naam) continue;
    try{
      await DB.upsertKandidaat({id:'c_'+Date.now()+'_'+i, ...velden, reisbereidheid:50});
      b.opgeslagen = true;
      opgeslagen++;
    }catch(e){ toast('Fout bij ' + (velden.naam||'kandidaat') + ': '+e.message); }
  }
  CANDIDATES = await DB.getKandidaten();
    CANDIDATES.forEach(herstelRawBlob);
  toast(opgeslagen + ' kandidat' + (opgeslagen===1?'':'en') + ' opgeslagen.');
  updateBadges();
  renderBatchDrawer();
}


/* ═══════════════════════════════════════════════
   DAG VERWERKING
   Volledig automatische pipeline: analyse -> match -> CV -> mail
   Gebruiker keurt alleen goed aan het einde.
═══════════════════════════════════════════════ */
let DAG = {
  fase: 'idle',   // idle | analyseren | matchen | genereren | review | klaar
  voortgang: 0,
  totaal: 0,
  log: [],
  wachtrij: []    // [{aanvraag, match, cvData, docxBlob, docxUri, mailData, status: 'wacht'|'goedgekeurd'|'overgeslagen'}]
};

function renderDagVerwerking(){
  document.getElementById('view').innerHTML = buildDagHtml();
  if(DAG.fase === 'idle') wireDagUpload();
}

function buildDagHtml(){
  let h = '';

  if(DAG.fase === 'idle' || DAG.fase === 'klaar'){
    // Upload zone
    h += `<div class="upload-zone" id="dagDrop" style="margin-bottom:16px">
      <strong>Sleep hier .eml of .msg bestanden van vandaag</strong><br>
      of een .zip van je volledige inbox - klik om te kiezen
    </div>
    <input type="file" id="dagInput" multiple accept=".eml,.msg,.txt,.zip" style="display:none">`;

    if(PENDING_MAILS.length){
      h += `<div class="banner info" style="margin-bottom:16px">
        ${PENDING_MAILS.length} mail${PENDING_MAILS.length===1?'':'s'} geladen.
        De app filtert automatisch op relevantie, matcht de beste kandidaat per aanvraag,
        herschrijft het CV en zet een conceptmail klaar. Jij keurt daarna alleen goed of sla je over.
      </div>
      <div style="display:flex;gap:8px;margin-bottom:20px">
        <button class="btn" onclick="startDagVerwerking()" id="btnDagStart">
          Verwerk ${PENDING_MAILS.length} mail${PENDING_MAILS.length===1?'':'s'} automatisch
        </button>
        <button class="btn ghost" onclick="PENDING_MAILS=[];renderDagVerwerking()">Wissen</button>
      </div>`;
    }

    if(DAG.wachtrij.length){
      h += buildReviewHtml();
    }
    return h;
  }

  if(['analyseren','matchen','genereren'].includes(DAG.fase)){
    const pct = DAG.totaal > 0 ? Math.round((DAG.voortgang/DAG.totaal)*100) : 0;
    h += `<div style="max-width:600px">
      <div style="font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);margin-bottom:12px">
        ${DAG.fase === 'analyseren' ? 'Mails analyseren' : DAG.fase === 'matchen' ? 'Kandidaten matchen' : 'CV herschrijven en mail opstellen'}
      </div>
      <div style="background:var(--paper-2);border-radius:20px;height:8px;margin-bottom:12px;overflow:hidden">
        <div style="background:var(--moss);height:100%;width:${pct}%;transition:width .3s;border-radius:20px"></div>
      </div>
      <div style="font-size:13px;color:var(--ink-soft);margin-bottom:20px">${DAG.voortgang} van ${DAG.totaal} - ${pct}%</div>
      <div style="display:flex;flex-direction:column;gap:6px;max-height:380px;overflow-y:auto">
        ${DAG.log.slice(-20).map(l=>`<div style="font-size:12px;color:${l.ok?'var(--moss-deep)':'var(--rust)'};font-family:var(--mono)">${l.ok?'v':'x'} ${esc(l.tekst)}</div>`).join('')}
      </div>
    </div>`;
    return h;
  }

  if(DAG.fase === 'review'){
    h += buildReviewHtml();
  }

  return h;
}

function buildReviewHtml(){
  const wacht = DAG.wachtrij.filter(w=>w.status==='wacht');
  const goed = DAG.wachtrij.filter(w=>w.status==='goedgekeurd');
  const over = DAG.wachtrij.filter(w=>w.status==='overgeslagen');
  const fout = DAG.wachtrij.filter(w=>w.status==='fout');

  let h = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
    <div>
      <div style="font-family:'Fraunces',serif;font-size:18px;font-weight:600">Ter goedkeuring</div>
      <div style="font-size:12px;color:var(--ink-soft);margin-top:2px">
        ${wacht.length} wacht - ${goed.length} goedgekeurd - ${over.length} overgeslagen${fout.length?' - '+fout.length+' mislukt':''}
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${wacht.length?`<button class="btn" onclick="goedkeurAlle()">Alles goedkeuren (${wacht.length})</button>`:''}
      ${goed.length?`<button class="btn" style="background:var(--moss-deep)" onclick="zetAlleKlaar()">Klaarzetten in concepten (${goed.length})</button>`:''}
      <button class="btn ghost" onclick="DAG={fase:'idle',voortgang:0,totaal:0,log:[],wachtrij:[]};PENDING_MAILS=[];renderDagVerwerking()">Nieuwe dag</button>
    </div>
  </div>`;

  if(!DAG.wachtrij.length){
    return h + `<div class="empty"><div class="big">Geen relevante aanvragen gevonden</div>Alle mails waren niet-relevant of er waren geen geschikte kandidaten.</div>`;
  }

  h += DAG.wachtrij.map((w,i) => dagWachtrij(w,i)).join('');
  return h;
}

function dagWachtrij(w, i){
  const statusKleur = {
    wacht: 'var(--slate)',
    goedgekeurd: 'var(--moss)',
    overgeslagen: '#aaa',
    fout: 'var(--rust)'
  }[w.status];
  const statusLabel = {wacht:'Wacht op beoordeling',goedgekeurd:'Goedgekeurd',overgeslagen:'Overgeslagen',fout:'Mislukt'}[w.status];

  if(w.status === 'fout'){
    return `<div class="panel" style="border-color:var(--rust);opacity:.7">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="font-weight:600">${esc(w.aanvraag?.functietitel||w.aanvraag?.onderwerp||'Aanvraag')}</div>
        <span style="font-size:11px;color:var(--rust)">${esc(w.foutmelding||'Onbekende fout')}</span>
      </div>
    </div>`;
  }

  const r = w.aanvraag, m = w.match, c = m?.candidate;
  const dl = dlInfo(r?.deadline);

  return `<div class="panel" id="dagitem_${i}" style="border-color:${w.status==='goedgekeurd'?'var(--moss)':w.status==='overgeslagen'?'var(--line)':'var(--line)'}">
    <div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:12px">
      <div style="flex:1">
        <div style="font-weight:700;font-size:15px">${esc(r.functietitel||r.onderwerp)}</div>
        <div style="font-size:12px;color:var(--ink-soft)">${esc(r.opdrachtgever||'')} ${r.locatie?'- '+esc(r.locatie):''} ${dl.txt!=='-'?'- deadline '+dl.txt:''}</div>
      </div>
      <span style="font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid;color:${statusKleur};border-color:${statusKleur}">${statusLabel}</span>
    </div>

    <div style="display:flex;align-items:center;gap:10px;background:var(--paper-2);border-radius:8px;padding:10px 12px;margin-bottom:12px">
      <div class="score-ring ${m.score>=70?'':m.score>=45?'mid':'low'}" style="--p:${m.score};width:38px;height:38px">
        <span style="width:28px;height:28px;font-size:11px">${m.score}</span>
      </div>
      <div>
        <div style="font-weight:600;font-size:13px">${esc(c.naam)}</div>
        <div style="font-size:11.5px;color:var(--ink-soft)">${(c.rollen||[]).join(' - ')} - beschikbaar ${esc(c.beschikbaar||'?')} - EUR ${c.tarief}</div>
      </div>
    </div>

    ${w.mailData?`
    <div style="margin-bottom:12px">
      <div class="df"><label>Aan</label><input id="dag_to_${i}" value="${esc(w.mailData.to||r.van)}" onchange="DAG.wachtrij[${i}].mailData.to=this.value"></div>
      <div class="df"><label>Onderwerp</label><input id="dag_sub_${i}" value="${esc(w.mailData.onderwerp)}" onchange="DAG.wachtrij[${i}].mailData.onderwerp=this.value"></div>
      <div class="df"><label>Bericht</label><textarea id="dag_body_${i}" style="min-height:120px" onchange="DAG.wachtrij[${i}].mailData.body=this.value">${esc(w.mailData.body)}</textarea></div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
      ${w.docxUri?`<button class="btn ghost sm" onclick="dagDownloadCV(${i})">CV downloaden (.docx)</button>`:''}
      <span style="font-size:11.5px;color:var(--slate)">Controleer voor goedkeuring</span>
    </div>
    `:''}

    <div style="display:flex;gap:8px;border-top:1px dashed var(--line);padding-top:12px">
      ${w.status!=='goedgekeurd'?`<button class="btn sm" onclick="dagGoedkeuren(${i})">Goedkeuren</button>`:''}
      ${w.status==='goedgekeurd'?`<button class="btn sm" style="background:var(--moss-deep)" onclick="dagKlaarzetten(${i})">Klaarzetten in concepten</button>`:''}
      ${w.status!=='overgeslagen'?`<button class="btn ghost sm" onclick="dagOverslaan(${i})">Overslaan</button>`:''}
      ${w.status==='overgeslagen'?`<button class="btn ghost sm" onclick="dagGoedkeuren(${i})">Toch goedkeuren</button>`:''}
    </div>
  </div>`;
}

/* ── Acties ── */
function dagGoedkeuren(i){ DAG.wachtrij[i].status='goedgekeurd'; renderDagVerwerking(); }
function dagOverslaan(i){ DAG.wachtrij[i].status='overgeslagen'; renderDagVerwerking(); }
function goedkeurAlle(){ DAG.wachtrij.filter(w=>w.status==='wacht').forEach(w=>w.status='goedgekeurd'); renderDagVerwerking(); }

function dagDownloadCV(i){
  const w = DAG.wachtrij[i];
  if(!w.docxUri){ toast('Geen CV beschikbaar.'); return; }
  const a=document.createElement('a');
  a.href=w.docxUri;
  a.download='CV_'+w.match.candidate.naam.replace(/\s+/g,'_')+'.docx';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}

async function dagKlaarzetten(i){
  const w = DAG.wachtrij[i];
  if(!w.mailData){ toast('Geen maildata beschikbaar.'); return; }
  try{
    await DB.saveConceptt({
      aanvraag_id: w.aanvraag.id||null,
      aanvraag_titel: w.aanvraag.functietitel||w.aanvraag.onderwerp,
      kandidaat_id: w.match.candidate.id,
      kandidaat_naam: w.match.candidate.naam,
      aan: w.mailData.to||w.aanvraag.van,
      onderwerp: w.mailData.onderwerp,
      body: w.mailData.body,
      cv_versie_id: null,
      cv_filename: 'CV_'+w.match.candidate.naam.replace(/\s+/g,'_')+'.docx',
      status: 'klaar'
    });
    CONCEPTEN = await DB.getConcepten();
    w.status = 'klaar';
    updateBadges();
    toast('Concept klaargezet.');
    renderDagVerwerking();
  }catch(e){ toast('Fout: '+e.message); }
}

async function zetAlleKlaar(){
  const goed = DAG.wachtrij.filter(w=>w.status==='goedgekeurd');
  for(let i=0;i<DAG.wachtrij.length;i++){
    if(DAG.wachtrij[i].status==='goedgekeurd') await dagKlaarzetten(i);
  }
  toast('Alle goedgekeurde concepten klaargezet.');
}

/* ── Hoofd pipeline ── */
async function startDagVerwerking(){
  if(!claudeKey()){ toast('Vul je Claude API-sleutel in.'); return; }
  if(!PENDING_MAILS.length){ toast('Geen mails geladen.'); return; }
  if(!CANDIDATES.length){ toast('Geen kandidaten in database.'); return; }

  DAG = {fase:'analyseren', voortgang:0, totaal:PENDING_MAILS.length, log:[], wachtrij:[]};
  renderDagVerwerking();

  // ── FASE 1: analyseer alle mails ──
  dagLog('Mails analyseren...', true);
  let relevanteAanvragen = [];
  try{
    const filterRes = await quickFilter(PENDING_MAILS);
    const relevante = PENDING_MAILS.filter((_,i)=>{
      const fr=filterRes.find(r=>r.index===i); return fr&&fr.relevant;
    });
    dagLog(relevante.length + ' relevante mails gevonden van ' + PENDING_MAILS.length, true);

    DAG.fase='analyseren';
    DAG.totaal = relevante.length;
    DAG.voortgang = 0;
    renderDagVerwerking();

    for(const mail of relevante){
      try{
        const analyse = await analyseMail(mail);
        const rec = {
          id:'r_'+mail.id, mail_id:mail.id, van:mail.from,
          ontvangen:mail.received, onderwerp:mail.subject, body:mail.body,
          ...analyse, status:'geanalyseerd', duplicate_of:null, matches:null
        };
        await DB.upsertAanvraag(rec);
        relevanteAanvragen.push(rec);
        DAG.voortgang++;
        dagLog('Geanalyseerd: ' + (analyse.functietitel||mail.subject), true);
        renderDagVerwerking();
      }catch(e){ dagLog('Analyse mislukt: '+mail.subject, false); DAG.voortgang++; }
    }
    AANVRAGEN = await DB.getAanvragen();
  }catch(e){ dagLog('Analysefase mislukt: '+e.message, false); }

  if(!relevanteAanvragen.length){
    dagLog('Geen relevante aanvragen gevonden.', true);
    DAG.fase='review'; renderDagVerwerking(); return;
  }

  // ── FASE 2: match elke aanvraag ──
  DAG.fase='matchen';
  DAG.totaal = relevanteAanvragen.length;
  DAG.voortgang = 0;
  renderDagVerwerking();

  const gematcht = [];
  for(const req of relevanteAanvragen){
    try{
      dagLog('Matchen: ' + req.functietitel, true);
      const matches = await runMatching(req);
      // Neem de beste match: score >= 60, beschikbaar, tarief past
      const beste = matches.find(m=>{
        if(m.score < 60) return false;
        const c = m.candidate;
        if(!c) return false;
        if(req.tarief_max){
          const maxT = parseFloat(String(req.tarief_max).replace(/[^0-9.]/g,''));
          if(maxT && c.tarief > maxT*1.1) return false;
        }
        return true;
      }) || (matches[0]?.score >= 40 ? matches[0] : null);

      if(beste){
        beste.candidate = CANDIDATES.find(c=>c.id===beste.candidate_id)||beste.candidate;
        gematcht.push({req, match:beste});
        dagLog('Match gevonden: ' + beste.candidate.naam + ' (score '+beste.score+')', true);
      } else {
        dagLog('Geen geschikte match voor: ' + req.functietitel, false);
        DAG.wachtrij.push({aanvraag:req, match:null, status:'fout', foutmelding:'Geen kandidaat met score >= 40 gevonden'});
      }
      DAG.voortgang++;
      renderDagVerwerking();
    }catch(e){
      dagLog('Match mislukt: '+e.message, false);
      DAG.wachtrij.push({aanvraag:req, match:null, status:'fout', foutmelding:e.message});
      DAG.voortgang++;
    }
  }

  // ── FASE 3: CV herschrijven + mail genereren per match ──
  DAG.fase='genereren';
  DAG.totaal = gematcht.length;
  DAG.voortgang = 0;
  renderDagVerwerking();

  for(const {req, match} of gematcht){
    const cand = match.candidate;
    try{
      dagLog('CV herschrijven: ' + cand.naam + ' voor ' + req.functietitel, true);
      const cvData = await rewriteCV(req, cand);

      // Word genereren
      let docxBlob=null, docxUri=null;
      if(cand.cv_bron?.opgeslagen || cand.cv_bron?.rawBlob){
        try{
          if(!cand.cv_bron.rawBlob){ await laadRawBlob(cand); }
          if(cand.cv_bron.rawBlob){
            docxBlob = await herschrijfDocx(cand.cv_bron.rawBlob, cvData, cand);
            const ab = await docxBlob.arrayBuffer();
            docxUri = 'data:application/vnd.openxmlformats-officedocument.wordprocessingml.document;base64,'+arrayBufferToBase64(ab);
            dagLog('CV gegenereerd als Word', true);
          }
        }catch(cvErr){ dagLog('Word genereren mislukt: '+cvErr.message, false); }
      } else {
        dagLog('Geen bron-CV voor '+cand.naam+' - mail zonder CV-bijlage', false);
      }

      // Mail genereren
      dagLog('Mail opstellen...', true);
      const mailResult = await generateMail(req, cand, match, cvData);
      const mailData = {
        to: req.van,
        onderwerp: mailResult.onderwerp,
        body: mailResult.body
      };

      DAG.wachtrij.push({
        aanvraag: req, match, cvData, docxBlob, docxUri, mailData,
        status: 'wacht'
      });
      dagLog('Klaar: ' + req.functietitel + ' - ' + cand.naam, true);
      DAG.voortgang++;
      renderDagVerwerking();
    }catch(e){
      dagLog('Genereren mislukt voor '+req.functietitel+': '+e.message, false);
      DAG.wachtrij.push({aanvraag:req, match, status:'fout', foutmelding:e.message});
      DAG.voortgang++;
      renderDagVerwerking();
    }
  }

  // Sla verwerkte aanvragen op
  AANVRAGEN = await DB.getAanvragen();
  PENDING_MAILS = [];
  DAG.fase = 'review';
  setBadge('b-dag', DAG.wachtrij.filter(w=>w.status==='wacht').length);
  renderDagVerwerking();
  toast('Verwerking klaar - ' + DAG.wachtrij.filter(w=>w.status==='wacht').length + ' aanvragen wachten op beoordeling.');
}

function dagLog(tekst, ok){ DAG.log.push({tekst, ok}); }

function wireDagUpload(){
  const drop=document.getElementById('dagDrop'), inp=document.getElementById('dagInput');
  if(!drop||!inp) return;
  drop.onclick=()=>inp.click();
  drop.ondragover=e=>{e.preventDefault();drop.classList.add('over');};
  drop.ondragleave=()=>drop.classList.remove('over');
  drop.ondrop=e=>{e.preventDefault();drop.classList.remove('over');handleMailFiles(e.dataTransfer.files);setTimeout(()=>renderDagVerwerking(),100);};
  inp.onchange=e=>{handleMailFiles(e.target.files);inp.value='';setTimeout(()=>renderDagVerwerking(),100);};
}


/* ═══════════════════════════════════════════════
   BESCHIKBAARHEIDSKALENDER
═══════════════════════════════════════════════ */
let KAL_DRAG = null; // {kandidaatId, naam, vanCelId} of null

function renderKalender(){
  const el = document.getElementById('view');
  el.innerHTML = buildKalenderHtml();
  wireKalender();
}

function kalMaanden(){
  const nu = new Date();
  const startMaand = nu.getMonth();
  const startJaar = nu.getFullYear();
  const maanden = [];
  // Huidig jaar: van nu t/m december
  for(let m = startMaand; m <= 11; m++) maanden.push({m:m+1, j:startJaar});
  // 2027+ wordt als één rij toegevoegd in buildKalenderHtml
  return maanden;
}

const MAAND_NAMEN = ['Jan','Feb','Mrt','Apr','Mei','Jun','Jul','Aug','Sep','Okt','Nov','Dec'];

function kalCelId(kandidaatId, m, j, rol){
  return kandidaatId+'__'+m+'__'+j+'__'+rol.replace(/\s+\/\s+/g,'_').replace(/\s+/g,'_');
}

function kalEntry(kandidaatId, m, j, rol){
  return KALENDER.find(e=>e.kandidaat_id===kandidaatId && e.maand===m && e.jaar===j && e.rol===rol);
}

function buildKalenderHtml(){
  const maanden = kalMaanden();
  const huidigJaar = new Date().getFullYear();
  const volgendJaar = huidigJaar + 1;

  // Collega's die al ergens in de kalender staan verbergen in sidebar
  const ingeplandIds = new Set(KALENDER.map(function(e){ return e.kandidaat_id; }));
  const beschikbaar = CANDIDATES.filter(function(c){ return !ingeplandIds.has(c.id); });
  const ingepland = CANDIDATES.filter(function(c){ return ingeplandIds.has(c.id); });

  // Sidebar
  let sidebar = '<div class="kal-sidebar">';
  sidebar += '<div style="font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);margin-bottom:8px">Beschikbaar</div>';
  if(beschikbaar.length){
    beschikbaar.forEach(function(c){
      sidebar += '<div class="kal-cand-chip" draggable="true" id="kcand_' + c.id + '">';
      sidebar += '<span style="width:8px;height:8px;border-radius:50%;background:var(--moss);display:inline-block;flex-shrink:0"></span>';
      sidebar += esc(c.naam) + '</div>';
    });
  } else {
    sidebar += '<div style="font-size:11.5px;color:var(--slate)">Alle collegas ingepland.</div>';
  }
  if(ingepland.length){
    sidebar += '<div style="font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);margin:14px 0 8px">Ingepland</div>';
    ingepland.forEach(function(c){
      sidebar += '<div style="padding:6px 8px;font-size:12px;color:var(--ink-soft);border-radius:6px;background:var(--paper-2);margin-bottom:4px">' + esc(c.naam) + '</div>';
    });
  }
  sidebar += '<div style="margin-top:14px;font-size:11px;color:var(--slate)">Sleep naar een cel. Ingeplande collegas verschijnen grijs.</div>';
  sidebar += '</div>';

  const alleRollen = ROL_KOLOMMEN.concat(['Verlenging']);

  // Tabel
  let tbl = '<div class="kal-wrap"><table class="kal-table"><thead><tr>';
  tbl += '<th class="maand-col">Maand</th>';
  ROL_KOLOMMEN.forEach(function(r){ tbl += '<th>' + esc(r) + '</th>'; });
  tbl += '<th>Verlenging</th></tr></thead><tbody>';

  let vorigJaar = null;

  maanden.forEach(function(mi){
    const m = mi.m, j = mi.j;
    if(vorigJaar !== null && j !== vorigJaar){
      tbl += '<tr><td colspan="' + (ROL_KOLOMMEN.length + 2) + '" style="background:var(--paper-2);font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--slate);padding:6px 12px;font-weight:600">' + j + '</td></tr>';
    }
    vorigJaar = j;
    tbl += '<tr class="' + (j===huidigJaar?'huidig-jaar':'volgend-jaar') + '">';
    tbl += '<td class="maand-cel">' + MAAND_NAMEN[m-1] + '</td>';
    alleRollen.forEach(function(rol){
      const celId = 'kalcel_' + m + '_' + j + '_' + rol.replace(/[^a-zA-Z0-9]/g,'_');
      const entries = KALENDER.filter(function(e){ return e.maand===m && e.jaar===j && e.rol===rol; });
      tbl += buildKalCel(celId, m, j, rol, entries);
    });
    tbl += '</tr>';
  });

  // 2027+ als één aparte rij
  const jaar2027 = volgendJaar; // 2027
  tbl += '<tr><td colspan="' + (ROL_KOLOMMEN.length + 2) + '" style="background:var(--paper-2);font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--slate);padding:6px 12px;font-weight:600">' + (jaar2027) + '+ en later</td></tr>';
  tbl += '<tr class="volgend-jaar"><td class="maand-cel" style="font-size:11px;color:var(--slate)">' + jaar2027 + '+</td>';
  alleRollen.forEach(function(rol){
    const celId = 'kalcel_2027_0_' + rol.replace(/[^a-zA-Z0-9]/g,'_');
    const entries = KALENDER.filter(function(e){ return e.jaar===jaar2027 && e.rol===rol; });
    tbl += buildKalCel(celId, 1, jaar2027, rol, entries);
  });
  tbl += '</tr>';

  tbl += '</tbody></table></div>';
  return '<div style="display:flex;gap:20px;align-items:flex-start">' + sidebar + tbl + '</div>';
}

function buildKalCel(celId, m, j, rol, entries){
  const nu = new Date();
  const huidigeM = nu.getMonth() + 1;
  const huidigJ = nu.getFullYear();
  // Cel is "huidig of toekomst" als datum >= huidige maand
  const isToekomst = (j > huidigJ) || (j === huidigJ && m >= huidigeM);
  const chipKlasse = isToekomst ? 'beschikbaar' : 'geplaatst';
  const celAchtergrond = isToekomst ? '' : 'background:var(--paper-2);';

  let cel = '<td id="' + celId + '" class="kaldroptarget" data-m="' + m + '" data-j="' + j + '" data-rol="' + esc(rol) + '" style="' + celAchtergrond + '"><div class="kal-cel">';
  entries.forEach(function(e){
    const naam = e.kandidaat_naam || '?';
    cel += '<div class="kal-chip ' + chipKlasse + '" draggable="true" data-entry-id="' + e.id + '">';
    cel += esc(naam);
    cel += '<span class="rm" onclick="kalVerwijder(' + e.id + ')">x</span>';
    cel += '</div>';
  });
  cel += '<div class="kal-add" data-m="' + m + '" data-j="' + j + '" data-rol="' + esc(rol) + '" onclick="kalAddViaKlik(' + m + ',' + j + ',this.dataset.rol)">+</div>';
  cel += '</div></td>';
  return cel;
}

function wireKalender(){
  // Sidebar drag-start via event delegation
  document.querySelectorAll('.kal-cand-chip').forEach(function(el){
    el.addEventListener('dragstart',function(e){
      const candId = el.id.replace('kcand_','');
      const cand = CANDIDATES.find(function(c){return c.id===candId;});
      if(cand) KAL_DRAG={type:'nieuw',kandidaatId:cand.id,naam:cand.naam};
      e.dataTransfer.effectAllowed='copy';
    });
  });
  // Chip drag-start
  document.querySelectorAll('.kal-chip[data-entry-id]').forEach(function(el){
    el.addEventListener('dragstart',function(e){
      const eid = parseInt(el.dataset.entryId);
      const entry = KALENDER.find(function(x){return x.id===eid;});
      KAL_DRAG={type:'verplaats',entryId:eid,naam:entry?entry.kandidaat_naam:'?'};
      e.dataTransfer.effectAllowed='move';
    });
  });
  // Drop targets
  document.querySelectorAll('.kaldroptarget').forEach(function(td){
    td.addEventListener('dragover',function(e){e.preventDefault();td.querySelector('.kal-cel').classList.add('over');});
    td.addEventListener('dragleave',function(){td.querySelector('.kal-cel').classList.remove('over');});
    td.addEventListener('drop',function(e){
      e.preventDefault();
      td.querySelector('.kal-cel').classList.remove('over');
      const m=parseInt(td.dataset.m), j=parseInt(td.dataset.j), rol=td.dataset.rol;
      kalDrop(e,m,j,rol);
    });
  });
}
/* Drag & drop */
function kalDragStart(event, kandidaatId, naam){
  KAL_DRAG = {type:'nieuw', kandidaatId, naam};
  event.dataTransfer.effectAllowed='copy';
}
function kalChipDragStart(event, entryId, naam){
  KAL_DRAG = {type:'verplaats', entryId, naam};
  event.dataTransfer.effectAllowed='move';
}
function kalDragOver(cel){
  cel.querySelector('.kal-cel')?.classList.add('over');
}
function kalDragLeave(cel){
  cel.querySelector('.kal-cel')?.classList.remove('over');
}
async function kalDrop(event, m, j, rol){
  event.preventDefault();
  const cel = event.currentTarget;
  cel.querySelector('.kal-cel')?.classList.remove('over');
  if(!KAL_DRAG) return;

  if(KAL_DRAG.type==='nieuw'){
    await kalToevoegen(KAL_DRAG.kandidaatId, KAL_DRAG.naam, m, j, rol, 'beschikbaar');
  } else if(KAL_DRAG.type==='verplaats'){
    // Verwijder oude entry en maak nieuwe
    const oude = KALENDER.find(e=>e.id===KAL_DRAG.entryId);
    if(oude){
      await kalVerwijder(oude.id, true);
      const cand = CANDIDATES.find(c=>c.id===oude.kandidaat_id);
      if(cand) await kalToevoegen(cand.id, cand.naam, m, j, rol, oude.status);
    }
  }
  KAL_DRAG = null;
}

function kalBepaalRol(cand){
  // Map eerste rol van kandidaat naar kalender-kolom
  const rollen = (cand.rollen||[]).map(r=>r.toLowerCase());
  if(rollen.some(r=>r.includes('scrum')||r.includes('agile'))) return 'Scrum Master';
  if(rollen.some(r=>r.includes('product owner')||r.includes('po'))) return 'Product Owner';
  if(rollen.some(r=>r.includes('project')||r.includes('program'))) return 'IT Projectmanager';
  if(rollen.some(r=>r.includes('business')||r.includes('analist')||r.includes('process'))) return 'Business Analist / Process Manager';
  return ROL_KOLOMMEN[0]; // fallback
}

async function kalToevoegen(kandidaatId, naam, m, j, rol, status='beschikbaar'){
  if(KALENDER.find(e=>e.kandidaat_id===kandidaatId&&e.maand===m&&e.jaar===j&&e.rol===rol)){
    toast('Al ingepland in deze cel.'); return;
  }
  try{
    await DB.upsertKalender({kandidaat_id:kandidaatId, kandidaat_naam:naam, maand:m, jaar:j, rol, status, bijgewerkt_op:new Date().toISOString()});
    KALENDER = await DB.getKalender();

    // Sync: update beschikbaar datum van kandidaat naar eerste dag van deze maand
    const cand = CANDIDATES.find(c=>c.id===kandidaatId);
    if(cand){
      const nieuweDatum = j + '-' + String(m).padStart(2,'0') + '-01';
      if(cand.beschikbaar !== nieuweDatum){
        cand.beschikbaar = nieuweDatum;
        const opslaan = {...cand, cv_bron: cand.cv_bron ? {naam:cand.cv_bron.naam, tekst:cand.cv_bron.tekst, opgeslagen:cand.cv_bron.opgeslagen} : null};
        await DB.upsertKandidaat(opslaan);
        CANDIDATES = await DB.getKandidaten();
        CANDIDATES.forEach(herstelRawBlob);
      }
    }
    renderKalender();
  }catch(e){ toast('Fout: '+e.message); }
}

async function kalVerwijder(id, stil=false){
  try{
    await DB.deleteKalender(id);
    KALENDER = await DB.getKalender();
    if(!stil) renderKalender();
  }catch(e){ if(!stil) toast('Fout: '+e.message); }
}

async function kalToggleStatus(id){
  const entry = KALENDER.find(e=>e.id===id);
  if(!entry) return;
  entry.status = entry.status==='beschikbaar'?'geplaatst':'beschikbaar';
  try{
    await DB.upsertKalender({...entry, bijgewerkt_op:new Date().toISOString()});
    KALENDER = await DB.getKalender();
    renderKalender();
  }catch(e){ toast('Fout: '+e.message); }
}

function kalAddViaKlik(m, j, rol){
  if(!CANDIDATES.length){ toast('Geen kandidaten beschikbaar.'); return; }
  // Toon een simpele select
  const naam = prompt('Naam van de collega:\n'+CANDIDATES.map(c=>c.naam).join(', '));
  if(!naam) return;
  const cand = CANDIDATES.find(c=>c.naam.toLowerCase()===naam.toLowerCase());
  if(!cand){ toast('Collega niet gevonden. Controleer de spelling.'); return; }
  kalToevoegen(cand.id, cand.naam, m, j, rol, 'beschikbaar');
}

function renderVandaag(){
  const el = document.getElementById('view');
  const openKanalen = KANALEN.filter(k=>k.status==='nieuw'||k.status==='in_behandeling');
  const vandaagDeadline = openKanalen.filter(k=>{
    if(!k.deadline) return false;
    const d = new Date(k.deadline); const nu = new Date();
    return d <= new Date(nu.getFullYear(),nu.getMonth(),nu.getDate()+2);
  });

  let h = '';

  // Invoer blok
  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px">';

  // Mail upload
  h += '<div class="card" style="padding:16px">';
  h += '<div style="font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);margin-bottom:10px">Mails uploaden</div>';
  h += '<div class="upload-zone" id="vdMailDrop" style="padding:16px;margin-bottom:8px"><strong>Sleep .eml of .msg bestanden</strong><br><span style="font-size:12px">of klik om te kiezen</span></div>';
  h += '<input type="file" id="vdMailInput" multiple accept=".eml,.msg,.txt,.zip" style="display:none">';
  if(PENDING_MAILS.length){
    h += '<div style="display:flex;gap:8px;margin-top:8px">';
    h += '<button class="btn sm" onclick="startBatchAnalyse()">Analyseren ('+PENDING_MAILS.length+')</button>';
    h += '<button class="btn ghost sm" onclick="PENDING_MAILS=[];renderVandaag()">Wissen</button>';
    h += '</div>';
  }
  h += '</div>';

  // Tekst plakken
  h += '<div class="card" style="padding:16px">';
  h += '<div style="font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);margin-bottom:10px">Tekst plakken (portal / WhatsApp)</div>';
  h += '<textarea id="vdTekst" placeholder="Plak hier een aanvraag uit een portal, WhatsApp of andere bron..." style="width:100%;height:110px;border:1px solid var(--line);border-radius:8px;padding:10px;font-size:13px;resize:none;font-family:var(--sans)"></textarea>';
  h += '<button class="btn sm" style="margin-top:8px" onclick="vdTekstAnalyse()">Analyseren</button>';
  h += '</div>';
  h += '</div>';

  // Dringende kanalen
  if(vandaagDeadline.length){
    h += '<div class="section-label">Deadline nadert</div>';
    h += '<div class="card">';
    vandaagDeadline.forEach(k=>{
      const rol = ROLLEN.find(r=>r.id===k.rol_id);
      const cand = CANDIDATES.find(c=>c.id===k.kandidaat_id);
      const dl = dlInfo(k.deadline);
      h += '<div class="row" onclick="window._openRol(this.dataset.id)" data-id='+k.rol_id+' style="cursor:pointer">';

      h += '<div class="title">'+(rol?esc(rol.functietitel):'?')+' <span style="font-size:12px;color:var(--slate);font-weight:400">via '+esc(k.broker_naam)+'</span></div>';
      h += '<div class="meta">'+(rol?esc(rol.klant||''):'')+(cand?' - kandidaat: <b>'+esc(cand.naam)+'</b>':'')+'</div>';
      h += '</div>';
      h += '<div class="right">';
      h += kanaalStatusPill(k.status);
      h += '<span class="dl soon">'+dl.txt+'</span>';
      if(k.opgepakt_door) h += '<span style="font-size:10px;font-family:var(--mono);background:var(--moss);color:#fff;padding:2px 8px;border-radius:20px">'+esc(k.opgepakt_door)+'</span>';
      h += '</div></div>';
    });
    h += '</div>';
  }

  // Alle open kanalen
  if(openKanalen.length){
    h += '<div class="section-label">Open ('+openKanalen.length+')</div>';
    h += '<div class="card">';
    openKanalen.filter(k=>!vandaagDeadline.includes(k)).slice(0,15).forEach(k=>{
      const rol = ROLLEN.find(r=>r.id===k.rol_id);
      const cand = CANDIDATES.find(c=>c.id===k.kandidaat_id);
      h += '<div class="row" onclick="window._openRol(this.dataset.id)" data-id='+k.rol_id+' style="cursor:pointer">';
      h += '<div class="body">';
      h += '<div class="title">'+(rol?esc(rol.functietitel):'?')+' <span style="font-size:12px;color:var(--slate);font-weight:400">via '+esc(k.broker_naam)+'</span></div>';
      h += '<div class="meta">'+(rol?esc(rol.klant||''):'')+(cand?' - '+esc(cand.naam):'')+(k.deadline?' - '+dlInfo(k.deadline).txt:'')+'</div>';
      h += '</div>';
      h += '<div class="right">'+kanaalStatusPill(k.status);
      if(k.opgepakt_door) h += '<span style="font-size:10px;font-family:var(--mono);background:var(--moss);color:#fff;padding:2px 8px;border-radius:20px">'+esc(k.opgepakt_door)+'</span>';
      h += '</div></div>';
    });
    h += '</div>';
  }

  if(!openKanalen.length && !PENDING_MAILS.length){
    h += '<div class="empty"><div class="big">Alles bijgewerkt</div>Upload mails of plak een aanvraag om te beginnen.</div>';
  }

  el.innerHTML = h;
  wireVdUpload();
}

function wireVdUpload(){
  const drop=document.getElementById('vdMailDrop'), inp=document.getElementById('vdMailInput');
  if(!drop||!inp) return;
  drop.onclick=()=>inp.click();
  drop.ondragover=e=>{e.preventDefault();drop.classList.add('over');};
  drop.ondragleave=()=>drop.classList.remove('over');
  drop.ondrop=e=>{e.preventDefault();drop.classList.remove('over');handleMailFiles(e.dataTransfer.files);setTimeout(()=>renderVandaag(),200);};
  inp.onchange=e=>{handleMailFiles(e.target.files);inp.value='';setTimeout(()=>renderVandaag(),200);};
}

async function vdTekstAnalyse(){
  const txt = document.getElementById('vdTekst')?.value.trim();
  if(!txt){ toast('Plak eerst een aanvraag tekst.'); return; }
  if(!claudeKey()){ toast('Vul je Claude API-sleutel in.'); return; }
  toast('Analyseren...', true);
  try{
    const sys = 'Je analyseert interim-aanvragen. Geef ALLEEN geldige JSON terug, geen uitleg.';
    const usr = 'Analyseer de aanvraag en geef JSON met deze velden (strings of null):\n'
      + '{"functietitel":"","klant":"","locatie":"","startdatum":"","duur":"","uren_per_week":"","tarief_max":"","deadline":"","eisen":[],"wensen":[],"role_type":""}\n\nTEKST:\n' + txt;
    const parsed = pj(await claude(sys, usr, 1400));
    // Maak direct een nieuwe rol + kanaal aan
    await openRolDrawerMetData({...parsed, omschrijving:txt, bron_type:'portal'});
    document.getElementById('vdTekst').value='';
  }catch(e){ toast('Fout: '+e.message); }
}

function kanaalStatusPill(status){
  const map = {
    nieuw:'background:#fff;color:var(--slate)',
    in_behandeling:'background:#e3eee4;color:var(--moss-deep);border-color:#a9c4ad',
    verstuurd:'background:#fbf3df;color:#8a6a18;border-color:#d9c08a',
    afgewezen:'background:#f6e4dc;color:#7a3520;border-color:#dba893',
    gewonnen:'background:#2f4733;color:#fff;border-color:#2f4733'
  };
  const label = {nieuw:'Nieuw',in_behandeling:'In behandeling',verstuurd:'Verstuurd',afgewezen:'Afgewezen',gewonnen:'Gewonnen'}[status]||status;
  return '<span style="font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:20px;border:1px solid var(--line);white-space:nowrap;'+( map[status]||'')+'">' + label + '</span>';
}

async function saveRol(){
  const r = window._editRol;
  if(!r) return;
  r.functietitel = document.getElementById('rd_titel')?.value.trim()||r.functietitel;
  r.klant = document.getElementById('rd_klant')?.value.trim()||null;
  r.locatie = document.getElementById('rd_locatie')?.value.trim()||null;
  r.uren_per_week = document.getElementById('rd_uren')?.value.trim()||null;
  r.deadline = document.getElementById('rd_deadline')?.value.trim()||null;
  r.omschrijving = document.getElementById('rd_omschrijving')?.value||null;
  r.status = document.getElementById('rd_status')?.value||'open';
  if(!r.functietitel){ toast('Functietitel is verplicht.'); return; }

  try{
    const saved = await DB.upsertRol(r);

    updateBadges();
    toast('Rol opgeslagen.');

    await openRolDrawer(saved.id);

  const broker = document.getElementById('nk_broker')?.value.trim();

  const k = {
    rol_id: rolId,

  };

async function updateKanaal(kanaalId, veld, waarde){
  const k = KANALEN.find(x=>x.id===kanaalId);
  if(!k) return;
  // Lege strings altijd als null opslaan
  k[veld] = (waarde===''||waarde===null||waarde===undefined) ? null : waarde;
  k.bijgewerkt_op = new Date().toISOString();
  try{
    await DB.upsertKanaal(k);
    KANALEN = await DB.getKanalen();
    updateBadges();
    // Herrender de drawer zodat de kandidaatnaam direct zichtbaar is
    const rol = ROLLEN.find(r=>r.id===k.rol_id);
    if(rol && document.getElementById('drawer').classList.contains('show')){
      const kanalen = KANALEN.filter(x=>x.rol_id===k.rol_id);
      const el = document.querySelector('#dBody .panel:nth-child(2)');
      // Herlaad de hele drawer voor actuele weergave
      await openRolDrawer(k.rol_id);
    }
  }catch(e){ toast('Fout: '+e.message); }
}

async function verwijderKanaal(id){
  if(!confirm('Kanaal verwijderen?')) return;
  const k = KANALEN.find(x=>x.id===id);
  const rolId = k?.rol_id;
  await DB.deleteKanaal(id);
  KANALEN = await DB.getKanalen();
  if(rolId) await openRolDrawer(rolId);
  toast('Kanaal verwijderd.');

async function verwijderRol(id){
  if(!confirm('Rol en alle bijbehorende kanalen verwijderen?')) return;

  ROLLEN = await DB.getRollen();
  KANALEN = await DB.getKanalen();

  renderRollenView();

}

async function checkDuplicaatRollen(rolId){
  const rol = ROLLEN.find(r=>r.id===rolId);
  if(!rol||!claudeKey()) return;
  const el = document.getElementById('dup_rollen_result');
  if(el) el.innerHTML='<span style="font-size:12px;color:var(--slate)">Controleren...</span>';
  const andereRollen = ROLLEN.filter(r=>r.id!==rolId&&r.status==='open');
  if(!andereRollen.length){ if(el) el.innerHTML='<span style="font-size:12px;color:var(--slate)">Geen andere open rollen om te vergelijken.</span>'; return; }
  try{
    const sys = 'Je vergelijkt interim-rollen om te bepalen of het dezelfde opdracht is. Antwoord ALLEEN geldige JSON.';
    const usr = 'ROL: '+rol.functietitel+' bij '+(rol.klant||'?')+'\n\nANDERE ROLLEN:\n'
      +andereRollen.map(function(r,i){return '['+i+'] '+r.functietitel+' bij '+(r.klant||'?');}).join('\n')
      +'\n\nGeef JSON: {"vergelijkbaar":[{"index":0,"reden":"waarom vergelijkbaar of niet","zelfde":true}]} voor rollen die mogelijk dezelfde opdracht zijn.';
    const res = pj(await claude(sys, usr, 800));
    const zelfde = (res.vergelijkbaar||[]).filter(v=>v.zelfde);
    if(!zelfde.length){ if(el) el.innerHTML='<div style="font-size:12px;color:var(--moss)">Geen vergelijkbare open rollen gevonden.</div>'; return; }

async function samenvoegRollen(rolId1, rolId2){
  if(!confirm('De kanalen van de tweede rol worden verplaatst naar de eerste. De tweede rol wordt verwijderd. Doorgaan?')) return;
  try{
    // Verplaats kanalen van rol2 naar rol1
    const k2 = KANALEN.filter(k=>k.rol_id===rolId2);
    for(const k of k2){
      k.rol_id = rolId1;
      k.bijgewerkt_op = new Date().toISOString();
      await DB.upsertKanaal(k);
    }
    // Verwijder rol2 (zonder cascade op kanalen nu die verplaatst zijn)
    await sb.from('rollen').delete().eq('id',rolId2);
    ROLLEN = await DB.getRollen();
    KANALEN = await DB.getKanalen();
    toast('Rollen samengevoegd.');
    await openRolDrawer(rolId1);
  }catch(e){ toast('Fout: '+e.message); }
}

async function extractFileText(file){
 const ext=file.name.split('.').pop().toLowerCase();
 if(ext==='txt')return await file.text();
 if(ext==='pdf'){
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let out='';for(let i=1;i<=pdf.numPages;i++){const pg=await pdf.getPage(i);const tc=await pg.getTextContent();out+=tc.items.map(it=>it.str).join(' ')+'\n';}
  return out;
 }
 if(ext==='docx'){const buf=await file.arrayBuffer();const r=await mammoth.extractRawText({arrayBuffer:buf});return r.value;}
 throw new Error('Onbekend bestandstype: .'+ext);
}

function renderMatches(r,matches){
 if(!matches.length)return`<p style="font-size:12.5px;color:var(--slate)">Geen kandidaten met score ≥ 25.</p>`;
 return matches.map((m,i)=>{
  const c=CANDIDATES.find(x=>x.id===m.candidate_id)||m.candidate;
  if(!c)return'';
  const cls=m.score>=70?'':m.score>=45?'mid':'low';
  const d=m.decision;
  const hasBron=!!(c.cv_bron?.tekst||c.profiel);
  return`<div class="match" id="match_${r.id}_${i}">
   <div class="match-top">
    <div class="score-ring ${cls}" style="--p:${m.score}"><span>${m.score}</span></div>
    <div style="flex:1"><div style="font-weight:700;font-size:14px">${esc(c.naam)}</div>
     <div style="font-size:12px;color:var(--ink-soft)">${(c.rollen||[]).join(' · ')} · €${c.tarief} · beschikbaar ${c.beschikbaar}</div></div>
   </div>
   <div class="reasoning">
    <div class="col pro"><h4>Passend</h4><ul>${(m.pro||[]).map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>
    <div class="col risk"><h4>Risico</h4><ul>${(m.risico||[]).map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>
    <div class="col covered"><h4>Eisen afgedekt</h4><ul>${(m.eisen_afgedekt||[]).map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>
    <div class="col missing"><h4>Ontbreekt</h4><ul>${(m.ontbreekt||[]).map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>
   </div>
   ${!hasBron?`<p class="nocv">⚠ Geen bron-CV of profiel aanwezig - voeg dit toe op de Kandidaten-pagina voor betere resultaten.</p>`:''}
   <div class="go-nogo">
    <button class="dec ${d==='voorstellen'?'yes':''}" onclick="decide('${r.id}',${i},'voorstellen')">✓ Voorstellen</button>
    <button class="dec ${d==='niet'?'no':''}" onclick="decide('${r.id}',${i},'niet')">✕ Niet</button>
    <button class="dec ${d==='later'?'wait':''}" onclick="decide('${r.id}',${i},'later')">◷ Later</button>
   </div>
   <div id="draft_${r.id}_${i}">${m.draftHtml||''}</div>
  </div>`;
 }).join('');
}

  ACTIES: match → decide → CV → PDF → mail → concept
═══════════════════════════════════════════════ */
async function doMatch(reqId, force){
 const r=AANVRAGEN.find(x=>x.id===reqId);
 if(!force){
  const btn=document.getElementById('matchBtn');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span> Matchen...';}  
 } else {
  toast('Opnieuw matchen met '+CANDIDATES.length+' kandidaten...', true);
 }
 try{
  const matches=await runMatching(r);
  if(force && r.matches){
   const oude=JSON.parse(r.matches);
   matches.forEach(m=>{
    const oud=oude.find(o=>o.candidate_id===m.candidate_id);
    if(oud?.decision) m.decision=oud.decision;
    if(oud?.draftHtml) m.draftHtml=oud.draftHtml;
    if(oud?.draft) m.draft=oud.draft;
    if(oud?.docxUri) m.docxUri=oud.docxUri;
    if(oud?.cv_versie_id) m.cv_versie_id=oud.cv_versie_id;
   });
  }
  r.matches=JSON.stringify(matches);
  r.status='kandidaten_gevonden';
  await DB.upsertAanvraag(r);
  AANVRAGEN=await DB.getAanvragen();
  renderReqBody(AANVRAGEN.find(x=>x.id===reqId));
  toast('Matching voltooid - '+matches.length+' kandidaten gerankt.');
 }catch(e){
  toast('Fout: '+e.message);
  const btn=document.getElementById('matchBtn');
  if(btn){btn.disabled=false;btn.textContent='Opnieuw proberen';}
 }
}

 // update knoppen

 if(el)el.querySelectorAll('.dec').forEach((b,bi)=>{b.classList.remove('yes','no','wait');if(bi===0&&choice==='voorstellen')b.classList.add('yes');else if(bi===1&&choice==='niet')b.classList.add('no');else if(bi===2&&choice==='later')b.classList.add('wait');});
 if(choice==='voorstellen'&&!m.draftHtml){
  const dd=document.getElementById(`draft_${reqId}_${i}`);
  if(dd)dd.innerHTML=`<div style="padding:12px 0;font-size:12.5px;color:var(--ink-soft)"><span class="spin d"></span> CV herschrijven en mail genereren…</div>`;
  try{
   const cand=CANDIDATES.find(c=>c.id===m.candidate_id);
   // 1 CV herschrijven
   toast('CV herschrijven…',true);
   const cvData=await rewriteCV(r,cand);

   const baseName='CV_'+cand.naam.replace(/ /g,'_')+'_v'+versieNr;

   if(!cvVersie) throw new Error('Geen CV beschikbaar voor '+cand.naam+'. Upload een rol-CV of bron-CV op de kandidaten-pagina.');
   toast('CV herschrijven ('+cvVersie.roltype+')…',true);
   const docxBlob=await herschrijfDocx(cvVersie.blob,cvData,cand);
   const arrBuf=await docxBlob.arrayBuffer();
   const docxUri='data:application/vnd.openxmlformats-officedocument.wordprocessingml.document;base64,'+arrayBufferToBase64(arrBuf);
   // Upload naar Supabase Storage
   toast('Uploaden…',true);
   let docxUrl=null;
   try{docxUrl=await DB.uploadDocx(cand.id,versieNr,docxBlob);}
   catch(uploadErr){console.warn('Upload mislukt, lokaal beschikbaar:',uploadErr.message);}
   // CV versie opslaan in DB (pdf_url kolom hergebruikt voor docx-url)
   const cvVersieRecord=await DB.saveCVVersie({kandidaat_id:cand.id,versie:versieNr,gemaakt_voor:r.functietitel,aanvraag_id:r.id,cv_data:cvData,pdf_url:docxUrl||''});
   m.cv_versie_id=cvVersieRecord?.id;
   m.docxUrl=docxUrl;
   m.docxUri=docxUri;
   m.cvFilename=baseName+'.docx';
   // 5 Mail genereren
   toast('Mail schrijven…',true);
   const mailResult=await generateMail(r,cand,m,cvData);
   m.draft={onderwerp:mailResult.onderwerp,body:mailResult.body,to:r.van};
   m.draftHtml=buildDraftHtml(r,m,i,cvData);
   // 6 Sla matches terug op
   r.matches=JSON.stringify(matches);
   r.status='concept_klaar';
   await DB.upsertAanvraag(r);
   AANVRAGEN=await DB.getAanvragen();
   const dd2=document.getElementById(`draft_${reqId}_${i}`);
   if(dd2)dd2.innerHTML=m.draftHtml;
   toast('CV en conceptmail klaar.');
  }catch(e){
   toast('Fout: '+e.message);m.decision=null;
   const dd3=document.getElementById(`draft_${reqId}_${i}`);
   if(dd3)dd3.innerHTML=`<p style="color:var(--rust);font-size:12px;margin-top:8px">Fout: ${esc(e.message)}</p>`;
  }
 }
 // sla beslissing op
 r.matches=JSON.stringify(matches);
 await DB.upsertAanvraag(r);
}

async function downloadConceptCV(conceptId){
  const c = CONCEPTEN.find(x=>x.id===conceptId);
  if(!c){ toast('Concept niet gevonden.'); return; }

  // Stap 1: zoek docxUri in actieve matches in geheugen
  for(const req of AANVRAGEN){
    if(req.id !== c.aanvraag_id) continue;
    const matches = JSON.parse(req.matches||'[]');
    for(const m of matches){
      if(m.candidate_id===c.kandidaat_id && m.docxUri){
        const a=document.createElement('a');
        a.href=m.docxUri;
        a.download=c.cv_filename||'CV.docx';
        document.body.appendChild(a);a.click();document.body.removeChild(a);
        return;
      }
    }
  }

  // Stap 2: haal op uit Supabase Storage via cv_versies
  if(c.cv_versie_id){
    try{
      const{data}=await sb.from('cv_versies').select('pdf_url').eq('id',c.cv_versie_id).single();
      if(data?.pdf_url && data.pdf_url.length > 10){
        // Probeer signed URL aan te maken (pdf_url kolom bevat nu docx-url)
        const path = data.pdf_url.includes('/cv-bestanden/')
          ? data.pdf_url.split('/cv-bestanden/').pop().split('?')[0]
          : null;
        if(path){
          const{data:signed}=await sb.storage.from('cv-bestanden').createSignedUrl(path,300);
          if(signed?.signedUrl){
            window.open(signed.signedUrl,'_blank');
            return;
          }
        }
        window.open(data.pdf_url,'_blank');
        return;
      }
    }catch(e){ console.warn('Storage ophalen mislukt:', e.message); }
  }

  // Stap 3: geen URL gevonden - vraag gebruiker om opnieuw te genereren
  toast('CV-bestand niet meer beschikbaar. Open de aanvraag en genereer het CV opnieuw via Voorstellen.');
}

/* ═══════════════════════════════════════════════
  EML DOWNLOAD - opent direct in Outlook
  RFC 2822 formaat, CV als base64-bijlage
═══════════════════════════════════════════════ */
async function downloadEML(conceptId){
 const c=CONCEPTEN.find(x=>x.id===conceptId);
 if(!c){toast('Concept niet gevonden.');return;}
 toast('EML voorbereiden\u2026',true);
 try{
  // Haal PDF op als base64
  let pdfB64='', pdfNaam=c.cv_filename||'CV.pdf';
  if(c.cv_versie_id){
   const{data}=await sb.from('cv_versies').select('pdf_url').eq('id',c.cv_versie_id).single();
   if(data?.pdf_url){
    try{
     // Haal binaire data op via signed URL
     const parts=data.pdf_url.split('/cv-bestanden/').pop().split('?')[0];
     const{data:signed}=await sb.storage.from('cv-bestanden').createSignedUrl(parts,120);
     const url=signed?.signedUrl||data.pdf_url;
     const resp=await fetch(url);
     const buf=await resp.arrayBuffer();
     pdfB64=arrayBufferToBase64(buf);
    }catch(e){ pdfB64=''; }
   }
  }

  const boundary='----=_Part_'+Date.now();
  const now=new Date().toUTCString();
  const fromAddr=SETTINGS.afzender_email||'werkbank@interim.nl';
  const fromNaam=SETTINGS.afzender_naam||'Interim Werkbank';

  // Verwijder HTML-tags uit body voor plain-text
  const plainBody=c.body.replace(/<[^>]+>/g,'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');

  let eml=`From: ${fromNaam} <${fromAddr}>
To: ${c.aan}
Subject: ${c.onderwerp}
Date: ${now}
MIME-Version: 1.0
Content-Type: multipart/mixed; boundary="${boundary}"

--${boundary}
Content-Type: text/plain; charset="utf-8"
Content-Transfer-Encoding: quoted-printable

${plainBody}
`;

  if(pdfB64){
   eml+=`
--${boundary}
Content-Type: ${isDocx?'application/vnd.openxmlformats-officedocument.wordprocessingml.document':'application/pdf'}; name="${pdfNaam}"
Content-Transfer-Encoding: base64
Content-Disposition: attachment; filename="${pdfNaam}"

${pdfB64}
`;
  }

  eml+=`--${boundary}--`;

  const blob=new Blob([eml],{type:'message/rfc822'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`${c.kandidaat_naam.replace(/\s+/g,'_')}_${c.aanvraag_titel.replace(/\W+/g,'_').slice(0,30)}.eml`;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),5000);
  toast('EML gedownload \u2014 dubbelklik om te openen in Outlook.');
 }catch(e){toast('Fout bij EML: '+e.message);}
}

function arrayBufferToBase64(buffer){
 let bin='';
 const bytes=new Uint8Array(buffer);
 for(let i=0;i<bytes.byteLength;i++)bin+=String.fromCharCode(bytes[i]);
 // wrap op 76 tekens (MIME standaard)
 const b64=btoa(bin);
 return b64.match(/.{1,76}/g).join('\r\n');
}

async function laadRolCVLijst(candId){
  if(!candId||candId.startsWith('c_')) return;
  const el = document.getElementById('rolcv_items');
  if(!el) return;
  try{
    const versies = await DB.getCVVersiesVanKandidaat(candId);
    const rolVersies = versies.filter(v=>v.roltype);
    if(!rolVersies.length){
      el.innerHTML='<div style="font-size:12px;color:var(--slate);padding:8px 0">Nog geen rol-CVs geupload. Selecteer een rol en klik + CV uploaden.</div>';
      return;
    }
    // Groepeer per roltype - toon per rol de meest recente versie
    const perRol = {};
    rolVersies.forEach(v=>{ perRol[v.roltype] = v; });
    el.innerHTML = '<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px">'
      + Object.entries(perRol).map(([rol, v])=>
        '<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--paper-2);border-radius:7px;border:1px solid var(--line)">'
        +'<span style="font-family:var(--mono);font-size:10px;background:var(--white);padding:3px 8px;border-radius:5px;border:1px solid var(--line);white-space:nowrap">'+esc(rol)+'</span>'
        +'<span style="font-size:12.5px;font-weight:600;flex:1">'+esc(v.versie_naam||'CV.docx')+'</span>'
        +'<button class="btn ghost sm" onclick="downloadRolCV(&quot;'+candId+'&quot;,&quot;'+esc(rol)+'&quot;)">Download</button>'
        +'<button class="btn ghost sm" style="color:var(--rust);border-color:var(--rust)" onclick="verwijderRolCV('+v.id+')">Verwijderen</button>'
        +'</div>'
      ).join('')
      +'</div>';
  }catch(e){ if(el) el.innerHTML='<div style="font-size:12px;color:var(--rust)">'+esc(e.message)+'</div>'; }
}

function wireRolCVUpload(candId){
  const inp = document.getElementById('rolcv_input');

  inp.onchange = async e=>{
    const file = e.target.files[0];
    if(!file) return;

    if(!rol){ toast('Selecteer eerst een rol.'); return; }

    if(statusEl) statusEl.textContent = 'Uploaden...';
    try{
      const {url} = await DB.uploadRolCV(candId, rol, file.name, file);
      // Sla ook op in cv_versies tabel
      const versieNr = await DB.getNextCVVersie(candId);
      await DB.saveCVVersie({kandidaat_id:candId, versie:versieNr, gemaakt_voor:rol, roltype:rol, versie_naam:file.name, aanvraag_id:null, cv_data:{}, pdf_url:url});

async function handleBronCV(file){
  if(!file.name.toLowerCase().endsWith('.docx')){
    toast('Alleen .docx bestanden zijn toegestaan als bron-CV.');
    return;
  }
  toast('CV inlezen...',true);
  try{
    const txt = await extractFileText(file);
    // Bewaar rawBlob in geheugen, b64 weglaten (te groot voor jsonb kolom)
    window._editCand.cv_bron = {naam:file.name, tekst:txt.slice(0,9000), rawBlob:file, opgeslagen:false};
    document.getElementById('cvBronInfo').innerHTML = '<div class="filechip">'+esc(file.name)+' <span style="font-size:11px;color:var(--slate);margin-left:6px">'+txt.length+' tekens</span><span class="x" onclick="clearBronCV()">x</span></div>';

  }catch(e){toast('Fout: '+e.message);}
}

function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=()=>rej(new Error('Lezen mislukt'));
    r.readAsDataURL(file);
  });
}

    cand.cv_bron = {naam:file.name, tekst:txt.slice(0,9000), opgeslagen:true, rawBlob:file};

// Haal de beste rol-CV op voor een kandidaat op basis van aanvraag-roltype
async function getBesteCVVersie(cand, req){
  // Map aanvraag roltype naar kolom-naam
  const rolMap = {
    agile: 'Scrum Master',
    projectmanagement: 'IT Projectmanager',
    process: 'Business Analist / Process Manager',
    business: 'Business Analist / Process Manager',
    overig: null
  };
  const doelRol = rolMap[req.role_type] || null;

  // Probeer rol-specifieke versie
  if(doelRol){
    const blob = await DB.getRolCVBlob(cand.id, doelRol);
    if(blob) return {blob, roltype:doelRol};
  }
  // Fallback: bron-CV
  if(cand.cv_bron?.rawBlob) return {blob:cand.cv_bron.rawBlob, roltype:'bron'};
  if(cand.cv_bron?.opgeslagen){
    const ok = await laadRawBlob(cand);
    if(ok && cand.cv_bron.rawBlob) return {blob:cand.cv_bron.rawBlob, roltype:'bron'};
  }
  return null;
}
// Laad rawBlob asynchroon vanuit Supabase Storage
async function laadRawBlob(cand){
  if(cand.cv_bron?.rawBlob) return true;   // al aanwezig
  if(!cand.cv_bron?.opgeslagen) return false; // nooit geupload
  try{
    const blob = await DB.getBronCVBlob(cand.id);
    if(!blob) return false;
    cand.cv_bron.rawBlob = blob;
    return true;
  }catch(e){
    console.warn('rawBlob laden mislukt voor '+cand.naam+':', e.message);
    return false;
  }
}

 if(!c.ervaring)c.ervaring=[];if(!c.opleiding)c.opleiding=[];
 try{
  await DB.upsertKandidaat(c);
  CANDIDATES=await DB.getKandidaten();
  CANDIDATES.forEach(herstelRawBlob);

  // Sync kalender: als beschikbaar datum is ingevuld, zet kandidaat in juiste kalendermaand
  if(c.beschikbaar){
    const bestaande = KALENDER.filter(e=>e.kandidaat_id===c.id);
    for(const e of bestaande) await DB.deleteKalender(e.id);
    const d = new Date(c.beschikbaar);

    KALENDER = await DB.getKalender();
  }

  toast('Kandidaat opgeslagen.');closeDrawer();setView('kandidaten');
 }catch(e){toast('Fout bij opslaan: '+e.message);}
}
